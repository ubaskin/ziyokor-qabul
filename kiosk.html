<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
  font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
:root{
  --bg:#ffffff; --card:#ffffff; --line:#cfd4da; --line2:#bcc2c8;
  --text:#3c3c3c; --hint:#777777;
  --green:#58cc02; --green-dark:#58a700;
  --blue:#1cb0f6; --blue-dark:#1899d6; --blue-bg:#ddf4ff;
  --success:#58cc02; --success-bg:#d7ffb8; --danger:#ff4b4b; --danger-bg:#ffdfe0;
}
html,body{height:100%;}
body{
  background:#fff; color:var(--text); min-height:100vh; overflow-x:hidden;
  font-weight:700; user-select:none; -webkit-user-select:none;
}
.wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
.screen{display:none;flex:1;padding:24px 20px 28px;}
.screen.active{display:flex;flex-direction:column;animation:fade .3s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== INTAKE ===== */
.brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin:14px 0 24px;}
.brand .logo{width:92px;height:92px;border-radius:26px;background:var(--green);
  display:flex;align-items:center;justify-content:center;font-size:46px;margin-bottom:14px;
  box-shadow:0 5px 0 var(--green-dark);}
.brand h1{font-size:28px;font-weight:900;letter-spacing:.5px;color:var(--green-dark);}
.brand p{color:var(--hint);font-size:15px;margin-top:6px;line-height:1.5;font-weight:700;}

.field{margin-bottom:18px;}
.field label{display:block;font-size:14px;color:var(--hint);margin-bottom:8px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px;}
.field input{
  width:100%;padding:15px 18px;border:2px solid var(--line);border-radius:16px;
  background:#f7f7f7;color:var(--text);font-size:18px;font-weight:700;outline:none;transition:border .15s,background .15s;
}
.field input:focus{border-color:var(--blue);background:#fff;}
.field input::placeholder{color:#afafaf;font-weight:700;}

.sinf-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.sinf-btn{
  padding:15px 0;border:2px solid #c4cad0;border-bottom:5px solid #aab2ba;border-radius:14px;background:#eef2f6;
  color:#3c3c3c;font-size:20px;font-weight:900;cursor:pointer;transition:all .1s;
}
.sinf-btn:active{transform:translateY(2px);border-bottom-width:3px;}
.sinf-btn.sel{border-color:var(--blue);border-bottom-color:var(--blue-dark);background:var(--blue-bg);color:var(--blue-dark);}

.btn{display:block;width:100%;padding:16px;border:none;border-radius:16px;
  font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  cursor:pointer;transition:transform .08s,box-shadow .08s,opacity .15s;}
.btn.primary{background:var(--green);color:#fff;box-shadow:0 5px 0 var(--green-dark);}
.btn.primary:active{transform:translateY(4px);box-shadow:0 1px 0 var(--green-dark);}
.btn.primary:disabled{background:#e5e5e5;color:#afafaf;box-shadow:0 5px 0 #d4d4d4;cursor:not-allowed;}
.err{color:var(--danger);font-size:14px;margin-top:6px;min-height:18px;font-weight:800;}

/* ===== TEST ===== */
#progress-bar{height:16px;background:#e5e5e5;border-radius:10px;margin-bottom:16px;overflow:hidden;}
#progress-fill{height:100%;background:var(--green);border-radius:10px;transition:width .35s;width:0;
  box-shadow:inset 0 4px 0 rgba(255,255,255,.3);}
.test-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
#q-number{font-size:15px;color:var(--hint);font-weight:800;}
#q-timer{font-size:15px;font-weight:800;color:var(--hint);font-variant-numeric:tabular-nums;}
#q-difficulty{display:inline-block;padding:5px 14px;border-radius:14px;font-size:12px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:18px;align-self:flex-start;}
.diff-1{background:var(--success-bg);color:var(--green-dark);}
.diff-2{background:var(--blue-bg);color:var(--blue-dark);}
.diff-3{background:#ffe9c9;color:#e07b00;}
.diff-4{background:var(--danger-bg);color:#ea2b2b;}
#q-text{font-size:23px;line-height:1.45;margin-bottom:24px;font-weight:800;color:#3c3c3c;}
.options{display:flex;flex-direction:column;gap:12px;}
.option-btn{display:flex;align-items:center;width:100%;padding:16px 18px;border:2px solid var(--line);
  border-bottom-width:4px;border-radius:16px;background:#fff;color:var(--text);font-size:19px;font-weight:800;
  cursor:pointer;transition:all .1s;text-align:left;}
.option-btn:active{transform:translateY(2px);border-bottom-width:2px;}
.option-letter{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:12px;
  border:2px solid var(--line);background:#fff;font-weight:900;font-size:16px;margin-right:14px;flex-shrink:0;color:var(--hint);}
.option-btn.selected{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-dark);}
.option-btn.selected .option-letter{border-color:var(--blue);color:var(--blue-dark);}
.option-btn.correct-answer{border-color:var(--green);background:var(--success-bg);color:var(--green-dark);}
.option-btn.correct-answer .option-letter{border-color:var(--green);color:var(--green-dark);}
.option-btn.wrong-answer{border-color:var(--danger);background:var(--danger-bg);color:#ea2b2b;}
.option-btn.wrong-answer .option-letter{border-color:var(--danger);color:#ea2b2b;}

/* ===== PAUSE ===== */

@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
#thanks-screen h2{font-size:32px;font-weight:900;margin-bottom:14px;color:var(--green-dark);}

<!-- ===== KIOSK CHIQISH DARCHASI (maxfiy) ===== -->
<div id="kiosk-tap" style="position:fixed;top:0;left:0;width:58px;height:58px;z-index:99998;"></div>
<div id="kiosk-exit" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(8,10,24,.92);
     align-items:center;justify-content:center;flex-direction:column;padding:24px;">
  <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;">Chiqish uchun parol</div>
  <div style="font-size:13px;color:#9aa3c7;margin-bottom:18px;">Faqat o'qituvchi uchun</div>
  <input id="kiosk-pin" type="password" inputmode="numeric" maxlength="8" autocomplete="off"
     style="width:200px;text-align:center;letter-spacing:8px;font-size:24px;padding:14px;border-radius:14px;
     border:2px solid #232a4d;background:#1a1f3a;color:#fff;outline:none;">
  <div id="kiosk-err" style="color:#ef4444;font-size:13px;height:18px;margin-top:8px;"></div>
  <div style="display:flex;gap:12px;margin-top:14px;">
    <button id="kiosk-cancel" style="padding:12px 22px;border:none;border-radius:12px;font-size:16px;font-weight:700;
       background:#232a4d;color:#fff;">Bekor</button>
    <button id="kiosk-ok" style="padding:12px 22px;border:none;border-radius:12px;font-size:16px;font-weight:700;
       background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;">Chiqish</button>
  </div>

<script>
/* Kiosk chiqish: top-left burchakka 5 marta ketma-ket teging → PIN → chiqish.
   PIN'ni o'zgartirish uchun shu raqamni tahrirlang. */
(function(){
  const KIOSK_EXIT_PIN = "2024";
  let taps=0, t0=0;
  const zone=document.getElementById('kiosk-tap');
  const modal=document.getElementById('kiosk-exit');
  const pin=document.getElementById('kiosk-pin');
  const err=document.getElementById('kiosk-err');
  zone.addEventListener('click',()=>{
    const now=Date.now();
    if(now-t0>3000) taps=0;
    t0=now; taps++;
    if(taps>=5){ taps=0; openModal(); }
  });
  function openModal(){ modal.style.display='flex'; err.textContent=''; pin.value=''; setTimeout(()=>pin.focus(),50); }
  function closeModal(){ modal.style.display='none'; }
  document.getElementById('kiosk-cancel').addEventListener('click',closeModal);
  document.getElementById('kiosk-ok').addEventListener('click',tryExit);
  pin.addEventListener('keydown',e=>{ if(e.key==='Enter') tryExit(); });
  function tryExit(){
    if(pin.value===KIOSK_EXIT_PIN){
      if(window.AndroidKiosk && window.AndroidKiosk.exitApp){ window.AndroidKiosk.exitApp(); }
      else { closeModal(); }   // web rejimida haqiqiy chiqish yo'q
    } else { err.textContent="Parol noto'g'ri"; pin.value=''; pin.focus(); }
  }
})();
</script>

<script>
/* ============================================================
   ZIYOKOR qabul testi — kiosk webapp
   - Loginsiz, fullscreen, planshet uchun
   - Adaptiv (sinf bo'yicha) ~10-12 savol
   - Bolaga natija KO'RSATILMAYDI
   - Natija → Firebase qabul_test/leads (menejer ekran + Telegram worker o'qiydi)
   ============================================================ */

// ---- Firebase (mavjud ziyokor2024 RTDB; YANGI qabul_test node) ----
let fbLeads = null, fbGroups = null;
try {
  firebase.initializeApp({ databaseURL: "https://ziyokor2024-default-rtdb.firebaseio.com" });
  const db = firebase.database();
  fbLeads = db.ref("qabul_test/leads");
  fbGroups = db.ref("qabul_test/groups");
} catch (e) { console.warn("Firebase init xato (offline rejim):", e); }

// ---- Sozlamalar ----
const TARGET_QUESTIONS = 12;     // jami savollar (10-12)
const MIN_QUESTIONS = 10;
const FATIGUE_LIMIT = 3;         // ketma-ket tez+noto'g'ri → pauza

// ---- Holat ----
let bank = [];                   // shu sinf savollari
let allQuestions = [];
let questionsReady = false;
let student = { name:"", sinf:null, phone:"" };
let engine = null;
let currentQuestion = null;
let questionStartTime = 0;
let timerInterval = null;

// ---- Savollarni yuklash ----
async function loadQuestions(){
  try{
    const resp = await fetch('./questions.json',{cache:'no-store'});
    const data = await resp.json();
    allQuestions = data.questions || [];
    questionsReady = true;
  }catch(e){ console.error("questions.json yuklanmadi:",e); }
}
loadQuestions();

// ---- Intake forma ----
function buildSinfGrid(){
  const g = document.getElementById('sinf-grid');
  for(let s=2;s<=11;s++){
    const b=document.createElement('button');
    b.className='sinf-btn'; b.textContent=s;
    b.onclick=()=>{ student.sinf=s;
      document.querySelectorAll('.sinf-btn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel'); validateIntake(); };
    g.appendChild(b);
  }
}
buildSinfGrid();

function validateIntake(){
  student.name = document.getElementById('in-name').value.trim();
  student.phone = document.getElementById('in-phone').value.trim();
  const ok = student.name.length>=2 && student.sinf!=null && student.phone.replace(/\D/g,'').length>=7;
  document.getElementById('start-btn').disabled = !ok;
  return ok;
}
document.getElementById('in-name').addEventListener('input',validateIntake);
document.getElementById('in-phone').addEventListener('input',validateIntake);

// ============================================================
//  Adaptiv dvigatel — Rasch (IRT) + vaqt modeli + CAT
//  - Har savol qiyinligi logit (beta). Bola qobiliyati theta EAP bilan baholanadi.
//  - Keyingi savol: joriy theta'da eng ko'p MA'LUMOT beradigani (haqiqiy adaptiv).
//  - Vaqt: tez/sekin × to'g'ri/xato → mavzu klassi + anomaliya bayroqlari.
//  Ilmiy asos: PLAN.md (Rasch, Van der Linden vaqt modeli, RTE filtrlari).
// ============================================================
const DIFF_BETA = {1:-1.2, 2:-0.4, 3:0.4, 4:1.2};   // qiyinlik → logit (sinfga nisbatan)
const THETA_GRID = (()=>{const g=[];for(let t=-3;t<=3.0001;t+=0.25)g.push(+t.toFixed(2));return g;})();
const EARLY_STOP_SE = 0.45;   // SE shu darajaga tushsa (va >=10 savol) → erta, ishonchli to'xtash

function pRasch(theta,beta){ return 1/(1+Math.exp(-(theta-beta))); }
function infoRasch(theta,beta){ const p=pRasch(theta,beta); return p*(1-p); } // Fisher ma'lumoti
function normCdf(z){ // standart normal CDF (Abramowitz–Stegun) — persentil uchun
  const t=1/(1+0.2316419*Math.abs(z)), d=0.3989423*Math.exp(-z*z/2);
  const p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));
  return z>0? 1-p : p;
}
function estimateTheta(resps){ // EAP: prior N(0,1) × Rasch likelihood, grid bo'yicha
  let num=0, den=0; const post=[];
  for(const t of THETA_GRID){
    let lik=Math.exp(-0.5*t*t);
    for(const r of resps){ const p=pRasch(t,r.beta); lik *= r.correct? p : (1-p); }
    post.push(lik); den+=lik; num+=t*lik;
  }
  const mean=den>0? num/den : 0;
  let varr=0; for(let i=0;i<THETA_GRID.length;i++){ const t=THETA_GRID[i]; varr+=(t-mean)*(t-mean)*post[i]; }
  return {theta:mean, se:Math.sqrt(den>0? varr/den : 1)};
}

class QabulEngine{
  constructor(pool){
    this.pool = pool.slice();
    for(const q of this.pool){ if(q.beta==null) q.beta = (DIFF_BETA[q.difficulty] ?? 0); }
    this.used = new Set();
    this.usedGroups = [];        // oxirgi guruhlar (xilma-xillik uchun)
    this.responses = [];
    this.theta = 0;              // boshlang'ich: sinf o'rtachasi
    this.se = 99;
    this.consecFastWrong = 0;
    this.askedCount = 0;
  }

  // CAT: joriy theta'da eng ko'p ma'lumot beradigan, xilma-xil guruhli savol
  pick(){
    const avail = this.pool.filter(q=>!this.used.has(q.id));
    if(!avail.length) return null;
    const recent = this.usedGroups.slice(-2);
    let best=null, bestS=-1;
    for(const q of avail){
      let s = infoRasch(this.theta, q.beta);
      if(recent.includes(q.topic_group_id)) s *= 0.4;   // yaqinda ko'rilgan guruh — kamroq
      if(s>bestS){ bestS=s; best=q; }
    }
    return best;
  }

  next(){
    if(this.askedCount >= TARGET_QUESTIONS) return null;
    if(this.askedCount >= MIN_QUESTIONS && this.se < EARLY_STOP_SE) return null; // ishonchli → to'xta
    const q = this.pick();
    if(!q) return null;
    this.used.add(q.id);
    this.usedGroups.push(q.topic_group_id);
    return q;
  }

  answer(q, letter, timeSec){
    const isCorrect = letter === q.correct;
    const exp = q.expected_time_sec || 30;
    const isFast = timeSec < Math.max(4, exp*0.25);
    const isSlow = timeSec > exp*2.5;
    // vaqt × to'g'rilik klassi (Van der Linden / Goldhammer)
    let cls;
    if(isCorrect && !isSlow) cls = isFast ? 'mustahkam' : 'yaxshi';  // tez/normal to'g'ri
    else if(isCorrect && isSlow) cls = 'sekin';                       // sekin to'g'ri (yordam/kalkulyator ehtimoli)
    else if(!isCorrect && isFast) cls = 'taxmin';                     // tez xato (e'tiborsizlik/taxmin)
    else cls = 'bilmaydi';                                            // sekin xato (haqiqiy bo'shliq)

    this.responses.push({
      id:q.id, sinf:q.sinf, beta:q.beta, topic_group_id:q.topic_group_id, topic_group:q.topic_group,
      difficulty:q.difficulty, answer:letter, correct:isCorrect, time_sec:timeSec, expected:exp, cls
    });
    this.askedCount++;

    // qobiliyatni yangilash (EAP)
    const est = estimateTheta(this.responses);
    this.theta = est.theta; this.se = est.se;

    if(isFast && !isCorrect) this.consecFastWrong++; else this.consecFastWrong=0;
    if(this.consecFastWrong >= FATIGUE_LIMIT){ this.consecFastWrong=0; return {action:'pause'}; }
    if(this.askedCount >= TARGET_QUESTIONS) return {action:'finish'};
    if(this.askedCount >= MIN_QUESTIONS && this.se < EARLY_STOP_SE) return {action:'finish'};
    return {action:'continue'};
  }

  // ---- Natija: theta → daraja 1-5 + persentil + zaif/kuchli + bayroqlar ----
  summary(){
    const r = this.responses;
    const total = r.length;
    const correct = r.filter(x=>x.correct).length;
    const percent = total? Math.round(correct/total*100):0;
    const avgTime = total? +(r.reduce((s,x)=>s+x.time_sec,0)/total).toFixed(1):0;

    const est = estimateTheta(r);
    const theta = est.theta, se = est.se;
    const percentile = Math.min(99, Math.max(1, Math.round(normCdf(theta)*100)));
    const hardCorrect = r.some(x=>x.correct && x.difficulty>=4);

    // Daraja 1-5 (o'z sinfiga nisbatan; theta=0 → sinf o'rtachasi)
    let level;
    if(theta < -1.0) level=1;          // orqada
    else if(theta < -0.3) level=2;     // darajada, kuchsiz
    else if(theta < 0.5) level=3;      // mustahkam
    else if(theta < 1.2) level=4;      // oldinda
    else level=5;                      // yuqori
    if(level===5 && !hardCorrect) level=4;   // qiyin savol yechilmasa 5 berilmaydi

    // Mavzu bo'yicha tahlil (vaqt klassi bilan)
    const groups = {};
    for(const x of r){
      const g = groups[x.topic_group] || (groups[x.topic_group]={tot:0,ok:0,solid:0});
      g.tot++; if(x.correct){ g.ok++; if(x.cls==='mustahkam') g.solid++; }
    }
    const arr = Object.entries(groups).map(([name,g])=>({name,ratio:g.ok/g.tot,tot:g.tot,solid:g.solid}));
    arr.sort((a,b)=>a.ratio-b.ratio);
    const minR = arr.length? arr[0].ratio : 0;
    const maxR = arr.length? arr[arr.length-1].ratio : 0;
    let weak = arr.filter(g=>g.ratio<0.5).map(g=>g.name);
    if(!weak.length && minR < maxR && minR < 0.75) weak = arr.filter(g=>g.ratio===minR).map(g=>g.name);
    let strong = arr.filter(g=>g.ratio>=0.75).map(g=>g.name);
    if(strong.length>3) strong = strong.slice(-3);

    // Anomaliya bayroqlari (menejer uchun ma'lumot)
    const flags = [];
    if(r.filter(x=>x.cls==='sekin').length >= 3) flags.push("Ko'p sekin-to'g'ri javob — yordam/kalkulyator ehtimoli");
    if(r.filter(x=>x.cls==='taxmin').length >= 3) flags.push("Ko'p tez-xato — e'tiborsizlik (haqiqiy bo'shliq emas)");

    return {
      total, correct, percent, avgTime,
      theta:+theta.toFixed(2), se:+se.toFixed(2), percentile, level,
      zaif: weak.slice(0,3), kuchli: strong, groups: arr, flags, responses:r
    };
  }
}

const LEVEL_LABEL = {1:"Orqada",2:"Darajada (kuchsiz)",3:"Mustahkam",4:"Oldinda",5:"Yuqori / olimpiada"};

// ============================================================
//  Oqim boshqaruvi
// ============================================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function startTest(){
  if(!validateIntake()) return;
  if(!questionsReady) await loadQuestions();
  bank = allQuestions.filter(q=>q.sinf===student.sinf);
  if(bank.length < MIN_QUESTIONS){
    // shu sinf savollari kam bo'lsa, yaqin sinflardan to'ldir
    const extra = allQuestions.filter(q=>Math.abs(q.sinf-student.sinf)<=1);
    bank = Array.from(new Map(extra.map(q=>[q.id,q])).values());
  }
  if(!bank.length){
    document.getElementById('intake-err').textContent = "Savollar yuklanmadi. Internetni tekshiring.";
    return;
  }
  engine = new QabulEngine(bank);
  showScreen('test-screen');
  nextQuestion();
}

function nextQuestion(){
  const q = engine.next();
  if(!q){ finishTest(); return; }
  currentQuestion = q;
  renderQuestion(q);
}

function renderQuestion(q){
  const prog = Math.min(1, engine.askedCount / TARGET_QUESTIONS);
  document.getElementById('progress-fill').style.width = (prog*100)+'%';
  document.getElementById('q-number').textContent = `Savol ${engine.askedCount+1} / ${TARGET_QUESTIONS}`;
  const diffLabels={1:'Oson',2:"O'rta",3:"O'rta+",4:'Qiyin'};
  const de=document.getElementById('q-difficulty');
  de.textContent=diffLabels[q.difficulty]||''; de.className=`diff-${q.difficulty}`;
  document.getElementById('q-text').textContent = q.text;

  const c=document.getElementById('options-container'); c.innerHTML='';
  for(const L of ['A','B','C','D']){
    if(!q.options[L]) continue;
    const b=document.createElement('button'); b.className='option-btn';
    b.innerHTML=`<span class="option-letter">${L}</span><span>${q.options[L]}</span>`;
    b.onclick=()=>selectAnswer(L); c.appendChild(b);
  }
  questionStartTime=performance.now(); startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  const el=document.getElementById('q-timer');
  timerInterval=setInterval(()=>{
    const s=Math.floor((performance.now()-questionStartTime)/1000);
    el.textContent=`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  },250);
}

function selectAnswer(letter){
  clearInterval(timerInterval);
  const timeSec=Math.round((performance.now()-questionStartTime)/100)/10;
  const q=currentQuestion;
  const isCorrect=letter===q.correct;
  document.querySelectorAll('.option-btn').forEach((b,i)=>{
    b.onclick=null;
    const L=['A','B','C','D'][i];
    if(L===q.correct) b.classList.add('correct-answer');
    if(L===letter && !isCorrect) b.classList.add('wrong-answer');
    if(L===letter) b.classList.add('selected');
  });
  const res=engine.answer(q,letter,timeSec);
  saveResumeState();
  setTimeout(()=>{
    if(res.action==='pause') showScreen('pause-screen');
    else if(res.action==='finish') finishTest();
    else nextQuestion();
  }, 650);
}

function resumeTest(){ showScreen('test-screen'); nextQuestion(); }

// Promise'ni vaqt bilan cheklaydi — Firebase javob bermay osilib qolsa, oqim qotmaydi
function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), ms))
  ]);
}

async function finishTest(){
  clearInterval(timerInterval);
  clearResumeState();   // darrov tozala — bu yerdan keyin qayta yuklansa phantom savol chiqmasin
  const sum = engine.summary();

  // tavsiya guruh — Firebase groups dan (sinf + daraja + bo'sh joy)
  let tavsiyaGuruh = "";
  try{
    if(fbGroups){
      const snap = await withTimeout(fbGroups.once('value'), 4000);
      const groups = snap.val()||{};
      const matches = Object.values(groups).filter(g=>
        Number(g.sinf)===student.sinf && Number(g.daraja)===sum.level &&
        (g.sigim==null || Number(g.band||0) < Number(g.sigim)));
      if(matches.length) tavsiyaGuruh = matches[0].nomi || `${matches[0].ustoz||''} ${matches[0].vaqt||''}`.trim();
    }
  }catch(e){ console.warn("groups o'qilmadi:",e); }

  const lead = {
    ism: student.name,
    sinf: student.sinf,
    tel: student.phone,
    sana: new Date().toISOString(),
    daraja: sum.level,
    darajaLabel: LEVEL_LABEL[sum.level],
    zaif: sum.zaif,
    kuchli: sum.kuchli,
    tavsiyaGuruh: tavsiyaGuruh,
    holat: "yangi",
    notified: false,
    foiz: sum.percent,
    persentil: sum.percentile,        // "sinfdoshlarining N%idan oldinda"
    theta: sum.theta,
    se: sum.se,
    bayroqlar: sum.flags,             // anomaliya bayroqlari (menejer uchun)
    jamiSavol: sum.total,
    togri: sum.correct,
    ortachaVaqt: sum.avgTime,
    mavzular: sum.groups,
    javoblar: sum.responses,
    createdAt: firebaseNow()
  };
  await saveAndSyncLead(lead);
  console.log("QABUL LEAD:", lead);

  showThanks();
}

function firebaseNow(){
  try{ return firebase.database.ServerValue.TIMESTAMP; }catch(e){ return Date.now(); }
}

// ============================================================
//  Oflayn navbat — internet uzilsa natija YO'QOLMAYDI
// ============================================================
async function saveAndSyncLead(lead){
  if(navigator.onLine && fbLeads){
    try{ await withTimeout(fbLeads.push(lead), 5000); return; }
    catch(e){ console.warn("to'g'ridan yozilmadi, navbatga:",e); }
  }
  queueLead(lead);
}
function queueLead(lead){
  try{
    const q = JSON.parse(localStorage.getItem('qabul_pending')||'[]');
    q.push(lead); localStorage.setItem('qabul_pending', JSON.stringify(q));
    console.log(`Natija oflayn navbatga saqlandi (${q.length} ta kutmoqda)`);
  }catch(e){ console.error("navbatga saqlanmadi:",e); }
}
async function flushQueue(){
  if(!navigator.onLine || !fbLeads) return;
  let q; try{ q = JSON.parse(localStorage.getItem('qabul_pending')||'[]'); }catch(e){ return; }
  if(!q.length) return;
  const remain = [];
  for(const lead of q){ try{ await fbLeads.push(lead); }catch(e){ remain.push(lead); } }
  try{ localStorage.setItem('qabul_pending', JSON.stringify(remain)); }catch(e){}
  if(q.length !== remain.length) console.log(`Navbatdan ${q.length-remain.length} natija yuborildi.`);
}
window.addEventListener('online', flushQueue);

// ============================================================
//  Uyqudan/yangilanishdan tiklash (10 daqiqadan yangi bo'lsa)
// ============================================================
function saveResumeState(){
  if(!engine || !currentQuestion) return;
  try{
    localStorage.setItem('qabul_resume', JSON.stringify({
      student, responses:engine.responses, used:[...engine.used], usedGroups:engine.usedGroups,
      theta:engine.theta, se:engine.se, askedCount:engine.askedCount,
      consecFastWrong:engine.consecFastWrong, currentQuestion, savedAt:Date.now()
    }));
  }catch(e){}
}
function clearResumeState(){ try{ localStorage.removeItem('qabul_resume'); }catch(e){} }
async function tryResume(){
  let st; try{ st = JSON.parse(localStorage.getItem('qabul_resume')||'null'); }catch(e){ return false; }
  if(!st || !st.responses || !st.currentQuestion) return false;
  if(Date.now()-st.savedAt > 10*60*1000){ clearResumeState(); return false; }  // eski → tashlab yubor
  if(!questionsReady) await loadQuestions();
  let pool = allQuestions.filter(q=>q.sinf===st.student.sinf);
  if(pool.length < MIN_QUESTIONS) pool = allQuestions.filter(q=>Math.abs(q.sinf-st.student.sinf)<=1);
  student = st.student;
  engine = new QabulEngine(pool);
  engine.responses=st.responses; engine.used=new Set(st.used); engine.usedGroups=st.usedGroups;
  engine.theta=st.theta; engine.se=st.se; engine.askedCount=st.askedCount; engine.consecFastWrong=st.consecFastWrong;
  // saqlangan currentQuestion — ALLAQACHON javob berilgan savol (saveResumeState answer'dan keyin chaqiriladi).
  // Shuning uchun uni qaytadan ko'rsatmaymiz — keyingi savolga o'tamiz (yoki >=TARGET bo'lsa yakunlaymiz).
  currentQuestion = null;
  showScreen('test-screen');
  nextQuestion();
  return true;
}

let resetTimer=null;
function showThanks(){
  showScreen('thanks-screen');
  document.getElementById('thanks-sub').textContent = "Bu ekran avtomatik yangilanadi…";
  clearTimeout(resetTimer);
  resetTimer=setTimeout(resetKiosk, 9000);  // keyingi o'quvchi uchun
}

function resetKiosk(){
  student={name:"",sinf:null,phone:""};
  engine=null; currentQuestion=null;
  document.getElementById('in-name').value="";
  document.getElementById('in-phone').value="";
  document.querySelectorAll('.sinf-btn').forEach(x=>x.classList.remove('sel'));
  document.getElementById('intake-err').textContent="";
  document.getElementById('start-btn').disabled=true;
  document.getElementById('progress-fill').style.width='0';
  showScreen('intake-screen');
}

// Kiosk: kontekst menyu, zoom va tortib-yangilashni o'chir
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{ if(e.scale && e.scale!==1) e.preventDefault(); },{passive:false});

// PWA: offline ishlashi uchun service worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

// Boshlang'ich: oflayn navbatni yubor + tugamagan testni tikla
(async function init(){
  flushQueue();
  try{ await tryResume(); }catch(e){ console.warn("tiklash xato:",e); }
})();
</script>
