<!DOCTYPE html><html lang="uz"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZIYOKOR — Qabul menejer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<meta name="theme-color" content="#070d1c">
<script>window.MathJax={tex:{inlineMath:[['$','$']]},svg:{fontCache:'global'}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
:root{--bg:#070d1c;--card:#0f1c38;--surf2:#0e1a34;--emer:#27c285;--emerd:#149a64;--gold:#e0bb63;--ink:#eef3fc;--mut:#92a3c4;--line:rgba(255,255,255,.10)}
*{box-sizing:border-box;font-family:'Manrope',system-ui,Arial,sans-serif}
body{margin:0;background:var(--bg);color:var(--ink)}
body::before{content:"";position:fixed;inset:0;z-index:-2;background:url('./qabul-assets/hero.jpg') center top/cover no-repeat;opacity:.28}
body::after{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(7,13,28,.55) 0%,rgba(7,13,28,.92) 38%,#070d1c 70%)}
.bar{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(7,13,28,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.logo{font-family:'Sora','Manrope',sans-serif;font-weight:800;letter-spacing:.5px;background:linear-gradient(90deg,var(--emer),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.bar b{color:var(--ink)}
.bar select{color:var(--ink)!important;width:auto;background:var(--surf2);border:1px solid var(--line);border-radius:9px;padding:8px 12px}
select,input,textarea,button{font-family:inherit}
.tabs{display:flex;gap:6px;padding:11px 18px;background:rgba(14,26,52,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:10px;font-weight:700;cursor:pointer;color:var(--mut);border:1px solid transparent}
.tab.on{background:rgba(39,194,133,.13);color:#7fe3b6;border-color:rgba(39,194,133,.3)}
.wrap{max-width:980px;margin:0 auto;padding:18px}
h2,h3{font-family:'Sora','Manrope',sans-serif;letter-spacing:-.01em}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin:12px 0;box-shadow:0 12px 32px rgba(0,0,0,.34)}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left}
th{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.btn{background:linear-gradient(180deg,var(--emer),var(--emerd));color:#04130c;border:none;border-radius:10px;padding:11px 17px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(39,194,133,.25)}
.btn:active{transform:translateY(1px)}
.btn.sec{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.sm{padding:7px 13px;font-size:13px}
label{font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);display:block;margin:12px 0 5px}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:var(--surf2);color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--emer);box-shadow:0 0 0 3px rgba(39,194,133,.16)}
input::placeholder,textarea::placeholder{color:#5d6e8c}
textarea{min-height:120px}
.row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:140px}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;background:rgba(63,164,240,.14);color:#8fcaf6;border:1px solid rgba(63,164,240,.24)}
.rev{background:rgba(224,187,99,.14);color:#e7c878;border-color:rgba(224,187,99,.32)}
.mut{color:var(--mut);font-size:13px}
.qrow{padding:11px;border:1px solid var(--line);border-radius:10px;margin:8px 0;cursor:pointer;display:flex;gap:8px;align-items:center;background:var(--surf2)}
.qrow:hover{border-color:rgba(255,255,255,.22);background:#13213e}
#login{max-width:360px;margin:90px auto;text-align:center}
.hidden{display:none}
.ok{color:#7fe3b6;font-weight:700}
[style*="c0392b"]{color:#ff7a7a!important}
mjx-container{color:var(--ink)}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 15px;font-size:12px;color:var(--mut);min-width:74px}
.stat b{color:var(--ink);font-size:20px;display:block;font-family:'Sora',sans-serif}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.lead{background:var(--card);border:1px solid var(--line);border-left:4px solid #2e3a5a;border-radius:16px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.32)}
.lead.l1{border-left-color:#ef4444}.lead.l2{border-left-color:#f59e0b}.lead.l3{border-left-color:#3fa4f0}.lead.l4{border-left-color:#27c285}.lead.l5{border-left-color:#c084fc}
.lead-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.lead-name{font-size:18px;font-weight:800;font-family:'Sora',sans-serif}
.lead-meta{font-size:12.5px;color:var(--mut);margin-top:3px;line-height:1.5}
.level-badge{padding:5px 11px;border-radius:10px;font-size:11.5px;font-weight:800;white-space:nowrap}
.lv0{background:rgba(255,255,255,.06);color:var(--mut)}.lv1{background:#3d161a;color:#f87171}.lv2{background:#3d2a0f;color:#fb923c}.lv3{background:#16243d;color:#60a5fa}.lv4{background:#0f3d2e;color:#34d399}.lv5{background:#2a163d;color:#c084fc}
.score{font-size:15px;font-weight:700;margin:6px 0 4px}
.bars{margin:10px 0 4px}
.bar{display:flex;align-items:center;gap:7px;font-size:12px;margin:4px 0}
.bar .bn{min-width:96px;color:var(--mut)}
.bar .bt{flex:1;height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.bar .bf{height:100%;border-radius:4px}
.hook{background:var(--surf2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;margin-top:10px;line-height:1.5;color:#cfd9ee}
.hook b{color:var(--gold)}
.lactions{display:flex;gap:8px;margin-top:12px}
.lactions a,.lactions button{flex:1;text-align:center;text-decoration:none;border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.acall{background:var(--emer);color:#04130c}
.aanal{background:transparent;color:var(--ink);border:1px solid var(--line)!important}
.tmodal{position:fixed;inset:0;z-index:50;background:rgba(3,7,16,.74);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:28px 14px}
.tmodal .card{max-width:470px;width:100%}
</style></head><body>
<div id="login" class="card">
 <div style="font-size:34px">🔐</div><h2>Qabul menejer</h2>
 <input id="pin" type="password" placeholder="PIN" style="text-align:center;font-size:20px">
 <button class="btn" style="width:100%;margin-top:12px" onclick="doLogin()">Kirish</button>
 <div class="mut" style="margin-top:8px">Filial: kirgach tanlanadi (Abituriyent / Prezident maktabi)</div>
</div>
<div id="main" class="hidden">
 <div class="bar"><span class="logo">ZIYOKOR</span><b>Qabul menejer</b>
  <select id="branch" style="width:auto;margin-left:auto;color:#333" onchange="loadAll()">
   <option value="abituriyent">Filial: Abituriyent</option>
   <option value="prezident">Filial: Prezident maktabi</option>
  </select>
 </div>
 <div class="tabs">
  <div class="tab on" data-t="res" onclick="tab('res')">📊 Natijalar</div>
  <div class="tab" data-t="qs" onclick="tab('qs')">📝 Savollar</div>
  <div class="tab" data-t="imp" onclick="tab('imp')">➕ Word→AI import</div>
 </div>
 <div class="wrap">
  <div id="res"></div>
  <div id="qs" class="hidden"></div>
  <div id="imp" class="hidden"></div>
 </div>
</div>
<div id="tmodal" class="tmodal hidden"><div class="card"><h3 style="margin-top:0">➕ talim+ ga qo‘shish</h3><div id="tbody"></div></div></div>
<script>
var DB="https://ziyokor2024-default-rtdb.firebaseio.com/qabul_test";       // asosiy baza
var DB2="https://ziyokor-qabul-default-rtdb.firebaseio.com/qabul_test";    // zaxira (dual-write)
var TDB="https://ziyokor2024-default-rtdb.firebaseio.com";                 // talim+ (filial: pm / abit)
var PIN="2024",DATA=null,PREZ=null,OVER={},SESS={},TCACHE={};
// dual-write: yozuvni ikkala bazaga ham yuboradi (asosiy javobni qaytaradi)
function dbWrite(sub,method,body){
 var o={method:method,headers:{'Content-Type':'application/json'}};if(body!=null)o.body=body;
 var p=fetch(DB+sub,o);fetch(DB2+sub,o).catch(function(){});return p;
}
function doLogin(){ if(document.getElementById('pin').value!==PIN){alert('PIN xato');return;}
 document.getElementById('login').classList.add('hidden');document.getElementById('main').classList.remove('hidden');loadAll();}
function tab(t){['res','qs','imp'].forEach(function(x){document.getElementById(x).classList.toggle('hidden',x!==t);});
 document.querySelectorAll('.tab').forEach(function(e){e.classList.toggle('on',e.dataset.t===t);});}
function typeset(){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise();}
function branch(){return document.getElementById('branch').value;}

function loadAll(){
 Promise.all([
   fetch('./qabul_questions.json?v='+Date.now()).then(function(r){return r.json()}),
   fetch('./prezident_math30.json?v='+Date.now()).then(function(r){return r.json()}).catch(function(){return null}),
   fetch(DB+'/overrides.json').then(function(r){return r.json()}).catch(function(){return{}}),
   fetch(DB+'/sessions.json').then(function(r){return r.json()}).catch(function(){return{}})
 ]).then(function(a){DATA=a[0];PREZ=a[1];OVER=a[2]||{};SESS=a[3]||{};renderRes();renderQs();renderImp();});
}
function applyOver(q){var o=OVER[q.id];if(o){for(var k in o)q[k]=o[k];}return q;}
// Joriy filialning yo'nalishlari (savol banki). Prezident — 30 savol bitta "yo'nalish" sifatida.
function branchYon(){
 if(branch()==='prezident'){
   if(!PREZ||!PREZ.questions)return[];
   return [{id:'prezident_math30',name:(PREZ.test||'Prezident maktabi — Matematika'),count:(PREZ.count||PREZ.questions.length),questions:PREZ.questions}];
 }
 return (DATA&&DATA.yonalishlar)||[];
}
// sessiya joriy filialga tegishlimi
function inBranch(s){var b=(s&&s.info&&s.info.branch)||'abituriyent';return b===branch();}
// id bo'yicha savolni joriy filial bankidan top
function findQ(qid){var ys=branchYon();for(var i=0;i<ys.length;i++){var qs=ys[i].questions||[];for(var j=0;j<qs.length;j++)if(qs[j].id===qid)return qs[j];}return null;}

var LEVEL_LABEL={0:"Baholanmagan",1:"Orqada",2:"Kuchsiz",3:"Mustahkam",4:"Oldinda",5:"Yuqori"};
function levelOf(pct,graded){ if(!graded)return 0; if(pct>=85)return 5; if(pct>=70)return 4; if(pct>=50)return 3; if(pct>=30)return 2; return 1; }
function fanBreakdown(s){var byFan={};
 Object.keys(s.answers||{}).forEach(function(qid){var raw=findQ(qid);if(!raw)return;var q=applyOver(Object.assign({},raw));if(!q.correct)return;
   var f=q.fan||'?';byFan[f]=byFan[f]||{c:0,t:0};byFan[f].t++;if(s.answers[qid]===q.correct)byFan[f].c++;});
 return byFan;
}
function esc(x){return (x==null?'':String(x)).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function phoneDigits(p){return (p||'').replace(/\D/g,'');}
var FSTATUS='all',FSEARCH='';
var STATUSES=['yangi',"bog'lanildi",'yozildi','rad etdi'];
function statusOf(s){return s.status||'yangi';}
function allRows(){return Object.keys(SESS||{}).map(function(k){var v=SESS[k]||{};v._key=k;return v;}).filter(inBranch)
  .sort(function(a,b){return (b.finished||'').localeCompare(a.finished||'');});}
function renderRes(){
 var el=document.getElementById('res');
 var all=allRows();
 var bugun=all.filter(function(s){return (s.finished||'').slice(0,10)===new Date().toISOString().slice(0,10);}).length;
 var bogl=all.filter(function(s){return statusOf(s)!=='yangi';}).length;
 var yoz=all.filter(function(s){return statusOf(s)==='yozildi';}).length;
 var h='<div class="stats">'
   +'<div class="stat"><b>'+all.length+'</b>Topshirdi</div>'
   +'<div class="stat"><b>'+bugun+'</b>Bugun</div>'
   +'<div class="stat"><b>'+bogl+'</b>Bog‘lanildi</div>'
   +'<div class="stat"><b>'+yoz+'</b>Yozildi</div></div>';
 h+='<div class="card" style="padding:12px;margin:8px 0"><div class="row">'
   +'<input id="fsearch" placeholder="🔎 Ism / telefon / yo‘nalish" value="'+FSEARCH.replace(/"/g,'&quot;')+'">'
   +'<select id="fstatus"><option value="all">Barcha holat</option>'+STATUSES.map(function(s){return '<option '+(FSTATUS===s?'selected':'')+'>'+s+'</option>';}).join('')+'</select>'
   +'<button class="btn sec" style="flex:0 0 auto" onclick="exportCsv()">📥 Excel</button>'
   +'</div></div><div id="cardwrap"></div><div id="anal"></div>';
 el.innerHTML=h;
 var fs=document.getElementById('fsearch');fs.oninput=function(){FSEARCH=this.value;renderCards();};
 document.getElementById('fstatus').onchange=function(){FSTATUS=this.value;renderCards();};
 renderCards();
}
function renderCards(){
 var wrap=document.getElementById('cardwrap');if(!wrap)return;
 var rows=allRows().filter(function(s){
   if(FSTATUS!=='all'&&statusOf(s)!==FSTATUS)return false;
   if(FSEARCH){var inf=s.info||{};var blob=((inf.name||'')+' '+(inf.tel||'')+' '+(inf.yon_name||'')).toLowerCase();if(blob.indexOf(FSEARCH.toLowerCase())<0)return false;}
   return true;});
 window._rows=rows;
 if(!rows.length){wrap.innerHTML='<div class="card mut">Mos natija yo‘q.</div>';return;}
 var h='<div class="lgrid">';
 rows.forEach(function(s,i){var inf=s.info||{};var key=s._key;
  var pct=s.graded?Math.round(s.correct/s.graded*100):0;var L=levelOf(pct,s.graded);
  var by=fanBreakdown(s);var fans=Object.keys(by);
  var bars=fans.map(function(f){var d=by[f];var p=Math.round(d.c/d.t*100);var col=p<50?'#ef4444':p<75?'#f59e0b':'#27c285';
    return '<div class="bar"><span class="bn">'+esc(f)+'</span><span class="bt"><span class="bf" style="width:'+p+'%;background:'+col+'"></span></span><span>'+p+'%</span></div>';}).join('');
  var weak=null,wp=101;fans.forEach(function(f){var p=by[f].c/by[f].t*100;if(p<wp){wp=p;weak=f;}});
  var hook=s.talim?('✅ talim+ ga yozilgan: <b>#'+esc(s.talim.id)+'</b> — '+esc(s.talim.group||'')):(weak?('Eng zaif: <b>'+esc(weak)+'</b> ('+Math.round(wp)+'%). Shu fan guruhiga taklif qiling.'):('Daraja <b>'+LEVEL_LABEL[L]+'</b>. Mos guruhga taklif qiling.'));
  var tel=phoneDigits(inf.tel);var st=statusOf(s);
  h+='<div class="lead l'+L+'">'
   +'<div class="lead-top"><div><div class="lead-name">'+esc(inf.name||'—')+'</div>'
     +'<div class="lead-meta">'+esc(inf.yon_name||'—')+'<br>'+esc(inf.sinf||'—')+'-sinf'+(inf.tel?' · '+esc(inf.tel):'')+' · '+((s.finished||'').slice(0,16).replace('T',' '))+'</div></div>'
     +'<div class="level-badge lv'+L+'">'+(L?'Daraja '+L:'—')+'</div></div>'
   +'<div class="score">Natija: '+(s.graded?('<b class=ok>'+s.correct+'/'+s.graded+'</b> ('+pct+'%)'):'<span class="mut">baholanmagan</span>')+' · javob '+(s.answered||0)+'/'+(s.total||0)+'</div>'
   +(bars?'<div class="bars">'+bars+'</div>':'')
   +'<div class="hook">💡 '+hook+'</div>'
   +'<div class="row" style="margin-top:10px;gap:8px">'
     +'<select onchange="setStatus(\''+key+'\',this.value)" style="flex:1">'+STATUSES.map(function(x){return '<option '+(st===x?'selected':'')+'>'+x+'</option>';}).join('')+'</select>'
     +'<input placeholder="izoh..." value="'+(s.note||'').replace(/"/g,'&quot;')+'" onchange="saveNote(\''+key+'\',this.value)" style="flex:1.4">'
   +'</div>'
   +'<div class="lactions">'+(tel?'<a class="acall" href="tel:'+tel+'">📞</a>':'')
     +'<button class="aanal" onclick="analyze('+i+')">🤖 Tahlil</button>'
     +'<a class="aanal" href="ozet.html?id='+encodeURIComponent(key)+'" target="_blank">📄 Xulosa</a>'
     +'<button class="aanal" style="color:#7fe3b6;border-color:rgba(39,194,133,.4)!important" onclick="openTalim(\''+key+'\')">➕ talim+</button>'
     +'<button class="aanal" style="color:#ff7a7a" onclick="delLead(\''+key+'\')">🗑</button>'
   +'</div></div>';
 });
 wrap.innerHTML=h+'</div>';
}
function setStatus(key,val){if(SESS[key])SESS[key].status=val;dbWrite('/sessions/'+key+'/status.json','PUT',JSON.stringify(val));renderCards();}
function saveNote(key,val){if(SESS[key])SESS[key].note=val;dbWrite('/sessions/'+key+'/note.json','PUT',JSON.stringify(val));}
function delLead(key){if(!confirm('Bu natijani o‘chirasizmi? (qaytarib bo‘lmaydi)'))return;
 dbWrite('/sessions/'+key+'.json','DELETE');delete SESS[key];renderRes();}
function exportCsv(){
 var rows=window._rows||[];var lines=['Ism,Yo‘nalish,Sinf,Telefon,Ball,Foiz,Holat,Izoh,Sana'];
 rows.forEach(function(s){var inf=s.info||{};var pct=s.graded?Math.round(s.correct/s.graded*100):'';
   function c(x){return '"'+String(x==null?'':x).replace(/"/g,'""')+'"';}
   lines.push([c(inf.name),c(inf.yon_name),c(inf.sinf),c(inf.tel),c(s.graded?s.correct+'/'+s.graded:''),c(pct),c(statusOf(s)),c(s.note||''),c((s.finished||'').slice(0,16).replace('T',' '))].join(','));});
 var blob=new Blob(['﻿'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
 var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='qabul_natijalar_'+branch()+'.csv';a.click();
}
function analyze(i){
 var s=window._rows[i],inf=s.info||{};
 var byFan={};
 Object.keys(s.answers||{}).forEach(function(qid){var raw=findQ(qid);if(!raw)return;var q=applyOver(Object.assign({},raw));if(!q.correct)return;
   var f=q.fan||'?';byFan[f]=byFan[f]||{c:0,t:0};byFan[f].t++;if(s.answers[qid]===q.correct)byFan[f].c++;});
 var h='<div class="card"><h3>AI tahlil — '+(inf.name||'')+'</h3>';
 var fans=Object.keys(byFan);
 if(!fans.length){h+='<div class="mut">Baholangan savollar yetarli emas (javoblar tasdiqlangach to‘liq tahlil bo‘ladi).</div>';}
 else{ fans.forEach(function(f){var d=byFan[f];var p=Math.round(d.c/d.t*100);
   h+='<div style="margin:8px 0"><b>'+f+':</b> '+d.c+'/'+d.t+' ('+p+'%) — '+(p>=70?'<span class=ok>kuchli</span>':p>=40?'o‘rtacha':'<span style="color:#c0392b">zaif, takrorlash kerak</span>')+'</div>';});
   h+='<div class="mut" style="margin-top:8px">Tavsiya: eng past foizli fan bo‘yicha qo‘shimcha tayyorgarlik.</div>';}
 h+='</div>';var an=document.getElementById('anal');an.innerHTML=h;an.scrollIntoView({behavior:'smooth'});
}

var curYon=null,curQ=null;
function renderQs(){
 var el=document.getElementById('qs');
 var ys=branchYon();
 if(!ys.length){el.innerHTML='<div class="card mut">Bu filial uchun savol banki topilmadi.</div>';return;}
 var opts=ys.map(function(y){var rev=y.questions.filter(function(q){var qq=applyOver(Object.assign({},q));return qq.needs_review||!qq.correct;}).length;
   return '<option value="'+y.id+'">'+y.name+' — '+y.count+' savol ('+rev+' tekshirilmagan)</option>';}).join('');
 el.innerHTML='<div class="card"><label>Yo‘nalish</label><select id="ysel" onchange="showQList()">'+opts+'</select>'
   +'<label style="text-transform:none;margin-top:10px;display:flex;gap:8px;align-items:center;cursor:pointer"><input type="checkbox" id="qrev" style="width:auto" onchange="showQList()"> Faqat tekshirilmaganlar</label></div>'
   +'<div id="qlist"></div><div id="qedit"></div>';
 showQList();
}
function showQList(){
 curYon=branchYon().find(function(y){return y.id===document.getElementById('ysel').value;});
 var onlyRev=document.getElementById('qrev')&&document.getElementById('qrev').checked;
 var h='<div class="card"><h3>'+curYon.name+'</h3>';
 curYon.questions.forEach(function(q,i){var qq=applyOver(Object.assign({},q));
  var bad=qq.needs_review||!qq.correct;
  if(onlyRev&&!bad)return;
  var preview=qq.img?'<img src="'+qq.img+'" style="height:38px;border-radius:6px">':(qq.text||'').slice(0,80)+'…';
  h+='<div class="qrow" onclick="editQ('+i+')"><span class="pill '+(bad?'rev':'')+'">'+(bad?'tekshirish':'OK')+'</span><span class="pill">'+(qq.fan||'')+'</span><span style="flex:1">'+preview+'</span>'+(qq.correct?'<b class=ok>'+qq.correct+'</b>':'')+'</div>';
 });
 h+='</div>';document.getElementById('qlist').innerHTML=h;document.getElementById('qedit').innerHTML='';typeset();
}
function editQ(i){
 var q=applyOver(Object.assign({},curYon.questions[i]));curQ=q;
 var o=q.options||{};
 var srcImg=(branch()==='prezident'&&/^pm-q/.test(q.id))?('./prezident-imgs/'+q.id.replace('pm-','')+'.png'):null;
 var h='<div class="card"><h3>Savolni tahrirlash</h3><div class="mut">'+q.id+'</div>'
  +(q.img?'<img src="'+q.img+'" style="max-width:100%;border-radius:10px;margin:8px 0;border:1px solid var(--line)">':'')
  +(srcImg?'<div class="mut" style="margin-top:8px">Asl rasm (solishtirish uchun):</div><img src="'+srcImg+'" style="max-width:100%;border-radius:10px;margin:6px 0;border:1px solid var(--line)" onerror="this.style.display=\'none\'">':'')
  +'<label>Savol matni '+(q.img?'(rasmli savol — matn ixtiyoriy)':'(LaTeX: $...$)')+'</label><textarea id="e_text">'+(q.text||'').replace(/</g,'&lt;')+'</textarea>'
  +'<label>Fan</label><input id="e_fan" value="'+(q.fan||'')+'">'
  +'<div class="row">'+['A','B','C','D'].map(function(L){return '<div><label>Variant '+L+'</label><input id="e_'+L+'" value="'+((o[L]||'')+'').replace(/"/g,'&quot;')+'"></div>';}).join('')+'</div>'
  +'<label>To‘g‘ri javob</label><select id="e_correct"><option value="">— tanlanmagan —</option>'+['A','B','C','D'].map(function(L){return '<option '+(q.correct===L?'selected':'')+'>'+L+'</option>';}).join('')+'</select>'
  +'<div style="margin-top:14px;display:flex;gap:10px"><button class="btn" onclick="saveQ()">💾 Saqlash</button><button class="btn sec" onclick="document.getElementById(\'qedit\').innerHTML=\'\'">Bekor</button></div>'
  +'<div id="savemsg" class="ok" style="margin-top:8px"></div></div>';
 document.getElementById('qedit').innerHTML=h;document.getElementById('qedit').scrollIntoView({behavior:'smooth'});
}
function saveQ(){
 var o={};['A','B','C','D'].forEach(function(L){var v=document.getElementById('e_'+L).value.trim();if(v)o[L]=v;});
 var patch={text:document.getElementById('e_text').value,fan:document.getElementById('e_fan').value,
   options:o,correct:document.getElementById('e_correct').value||null,
   needs_review:!document.getElementById('e_correct').value,edited:new Date().toISOString()};
 dbWrite('/overrides/'+curQ.id+'.json','PUT',JSON.stringify(patch))
  .then(function(){OVER[curQ.id]=patch;document.getElementById('savemsg').textContent='✅ Saqlandi (kioskda darrov ishlaydi)';showQList();})
  .catch(function(){document.getElementById('savemsg').textContent='❌ Saqlanmadi';});
}

// ===== talim+ ga qo'shish (Filial → Fan → O'qituvchi → Guruh) =====
var TKEY=null,TSEL={filial:'pm',fan:'',teacher:'',group:''};
function tdata(filial,cb){
 if(TCACHE[filial])return cb(TCACHE[filial]);
 Promise.all([
   fetch(TDB+'/'+filial+'/teachers.json').then(function(r){return r.json()}),
   fetch(TDB+'/'+filial+'/guruxlar.json').then(function(r){return r.json()})
 ]).then(function(a){TCACHE[filial]={teachers:a[0]||{},groups:a[1]||{}};cb(TCACHE[filial]);})
  .catch(function(){cb({teachers:{},groups:{}});});
}
function openTalim(key){TKEY=key;TSEL={filial:'pm',fan:'',teacher:'',group:''};
 document.getElementById('tmodal').classList.remove('hidden');tStep();}
function closeTalim(){document.getElementById('tmodal').classList.add('hidden');}
function tStep(){
 var inf=(SESS[TKEY]||{}).info||{};
 tdata(TSEL.filial,function(D){
  var fans=[];for(var t in D.teachers){var f=D.teachers[t].fan;if(f&&fans.indexOf(f)<0)fans.push(f);}fans.sort();
  var teachers=Object.keys(D.teachers).filter(function(t){return D.teachers[t].fan===TSEL.fan;}).map(function(t){return {id:t,name:(D.teachers[t].name||'').trim()};}).sort(function(a,b){return a.name.localeCompare(b.name);});
  var groups=[];for(var g in D.groups){var gg=D.groups[g];if(gg&&gg.active&&String(g).split('_')[0]===TSEL.teacher)groups.push(gg);}
  var h='<div class="lead-meta" style="margin-bottom:12px">O‘quvchi: <b style="color:var(--ink)">'+esc(inf.name||'')+'</b> · '+esc(inf.sinf||'')+'-sinf · '+esc(inf.tel||'')+'</div>';
  h+='<label>Filial</label><select onchange="TSEL.filial=this.value;TSEL.fan=\'\';TSEL.teacher=\'\';TSEL.group=\'\';tStep();"><option value="pm" '+(TSEL.filial==='pm'?'selected':'')+'>PM (kurs)</option><option value="abit" '+(TSEL.filial==='abit'?'selected':'')+'>Abituriyent</option></select>';
  h+='<label>1) Fan</label><select onchange="TSEL.fan=this.value;TSEL.teacher=\'\';TSEL.group=\'\';tStep();"><option value="">— tanlang —</option>'+fans.map(function(f){return '<option '+(TSEL.fan===f?'selected':'')+'>'+esc(f)+'</option>';}).join('')+'</select>';
  if(TSEL.fan)h+='<label>2) O‘qituvchi</label><select onchange="TSEL.teacher=this.value;TSEL.group=\'\';tStep();"><option value="">— tanlang —</option>'+teachers.map(function(t){return '<option value="'+t.id+'" '+(TSEL.teacher===t.id?'selected':'')+'>'+esc(t.name)+'</option>';}).join('')+'</select>';
  if(TSEL.teacher){h+='<label>3) Guruh</label><select onchange="TSEL.group=this.value;tStep();"><option value="">— tanlang —</option>'+groups.map(function(g){return '<option value="'+g.id+'" '+(TSEL.group===g.id?'selected':'')+'>'+esc(g.name)+(g.room?' · '+esc(g.room):'')+'</option>';}).join('')+'</select>';
   if(!groups.length)h+='<div class="mut" style="margin-top:6px">Bu o‘qituvchida faol guruh yo‘q.</div>';}
  h+='<div id="tmsg" class="ok" style="margin-top:12px"></div>';
  h+='<div style="display:flex;gap:10px;margin-top:14px"><button class="btn" '+(TSEL.group?'':'disabled')+' onclick="doEnroll()">✅ Qo‘shish</button><button class="btn sec" onclick="closeTalim()">Bekor</button></div>';
  document.getElementById('tbody').innerHTML=h;
 });
}
function pad4(n){return ('0000'+n).slice(-4);}
function doEnroll(){
 var inf=(SESS[TKEY]||{}).info||{};var fil=TSEL.filial,gid=TSEL.group;
 var D=TCACHE[fil]||{teachers:{},groups:{}};
 var gname=(D.groups[gid]||{}).name||gid;var tname=((D.teachers[TSEL.teacher]||{}).name||'').trim();
 if(!confirm('“'+(inf.name||'')+'” ni REAL talim+ bazasiga qo‘shamizmi?\n'+fil.toUpperCase()+' / '+tname+' / '+gname))return;
 var msg=document.getElementById('tmsg');msg.textContent='⏳ ID olinmoqda...';
 fetch(TDB+'/'+fil+'/talabalar/all.json?shallow=true').then(function(r){return r.json()}).then(function(all){
  var mx=0;for(var k in (all||{})){var n=parseInt(k,10);if(!isNaN(n)&&n>mx)mx=n;}
  var id=pad4(mx+1);var today=new Date().toISOString().slice(0,10);
  var stud={name:inf.name||'',tel:inf.tel||'',sinf:inf.sinf||'',aktiv:true,address:'',source:'qabul',qabulYon:inf.yon_name||'',created:today};
  var mem={active:true,joinedDate:today,startDate:today};
  var patch={};patch[fil+'/talabalar/all/'+id]=stud;patch[fil+'/members/'+gid+'/'+id]=mem;patch[fil+'/studentGroups/'+id+'/'+gid]=mem;
  var audit={studentId:id,filial:fil,group:gid,groupName:gname,teacher:tname,student:inf.name||'',sessionKey:TKEY,at:new Date().toISOString()};
  msg.textContent='⏳ Qo‘shilmoqda...';
  fetch(TDB+'/.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)}).then(function(r){
    if(!r.ok)throw 0;
    dbWrite('/talim_audit.json','POST',JSON.stringify(audit));
    var tinfo={filial:fil,id:id,group:gname,groupId:gid,at:audit.at};
    if(SESS[TKEY]){SESS[TKEY].talim=tinfo;SESS[TKEY].status='yozildi';}
    dbWrite('/sessions/'+TKEY+'/talim.json','PUT',JSON.stringify(tinfo));
    dbWrite('/sessions/'+TKEY+'/status.json','PUT',JSON.stringify('yozildi'));
    msg.textContent='✅ Qo‘shildi! talim+ ID: #'+id;
    setTimeout(function(){closeTalim();renderRes();},1300);
  }).catch(function(){msg.textContent='❌ Xato — qo‘shilmadi';});
 }).catch(function(){msg.textContent='❌ ID olinmadi';});
}
function renderImp(){
 var el=document.getElementById('imp');
 if(branch()==='prezident'){el.innerHTML='<div class="card mut">Prezident maktabi savollari rasm asosida (qabul-data orqali yuklanadi). Bu yerda faqat Abituriyent uchun matnli import mavjud.</div>';return;}
 var opts=DATA.yonalishlar.map(function(y){return '<option value="'+y.id+'">'+y.name+'</option>';}).join('');
 el.innerHTML='<div class="card"><h3>Word uslubidagi misolni qo‘shish (AI)</h3>'
  +'<div class="mut">Word/test matnini (savol + A) B) C) D) variantlar) shu yerga qo‘ying. AI uni tahlil qilib, javobini topib, tanlangan yo‘nalishga qo‘shadi.</div>'
  +'<label>Yo‘nalish</label><select id="imp_yon">'+opts+'</select>'
  +'<label>Savol matni</label><textarea id="imp_text" placeholder="1. Hisoblang: 2+2\nA) 3  B) 4  C) 5  D) 6"></textarea>'
  +'<label>Fan (ixtiyoriy)</label><input id="imp_fan" placeholder="masalan Matematika">'
  +'<button class="btn" style="margin-top:12px" onclick="queueImport()">🤖 AI bilan qo‘shish</button>'
  +'<div id="impmsg" class="ok" style="margin-top:10px"></div>'
  +'<div class="mut" style="margin-top:6px">Eslatma: AI ishlovchi (worker) navbatdan olib qayta ishlaydi — bir necha daqiqada savol bankga qo‘shiladi.</div></div>';
}
function queueImport(){
 var rec={yon:document.getElementById('imp_yon').value,fan:document.getElementById('imp_fan').value,
   text:document.getElementById('imp_text').value,status:'queued',created:new Date().toISOString()};
 if(!rec.text.trim()){alert('Matn kiriting');return;}
 dbWrite('/import_queue.json','POST',JSON.stringify(rec))
  .then(function(){document.getElementById('impmsg').textContent='✅ Navbatga qo‘shildi. AI tez orada qayta ishlaydi.';document.getElementById('imp_text').value='';})
  .catch(function(){document.getElementById('impmsg').textContent='❌ Xato';});
}
