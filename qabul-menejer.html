<!DOCTYPE html><html lang="uz"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZIYOKOR — Qabul menejer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<meta name="theme-color" content="#070d1c">
<script>window.MathJax={tex:{inlineMath:[['$','$']]},svg:{fontCache:'global'}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
:root{--bg:#070d1c;--card:#0f1c38;--surf2:#0e1a34;--emer:#27c285;--emerd:#149a64;--gold:#e0bb63;--ink:#eef3fc;--mut:#92a3c4;--line:rgba(255,255,255,.10)}
*{box-sizing:border-box;font-family:'Manrope',system-ui,Arial,sans-serif}
body{margin:0;background:var(--bg);color:var(--ink)}
body::before{content:"";position:fixed;inset:0;z-index:-2;background:url('./qabul-assets/hero.jpg') center top/cover no-repeat;opacity:.28}
body::after{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(7,13,28,.55) 0%,rgba(7,13,28,.92) 38%,#070d1c 70%)}
.bar{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(7,13,28,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.logo{font-family:'Sora','Manrope',sans-serif;font-weight:800;letter-spacing:.5px;background:linear-gradient(90deg,var(--emer),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.bar b{color:var(--ink)}
.bar select{color:var(--ink)!important;width:auto;background:var(--surf2);border:1px solid var(--line);border-radius:9px;padding:8px 12px}
select,input,textarea,button{font-family:inherit}
.tabs{display:flex;gap:6px;padding:11px 18px;background:rgba(14,26,52,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:10px;font-weight:700;cursor:pointer;color:var(--mut);border:1px solid transparent}
.tab.on{background:rgba(39,194,133,.13);color:#7fe3b6;border-color:rgba(39,194,133,.3)}
.wrap{max-width:980px;margin:0 auto;padding:18px}
h2,h3{font-family:'Sora','Manrope',sans-serif;letter-spacing:-.01em}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin:12px 0;box-shadow:0 12px 32px rgba(0,0,0,.34)}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left}
th{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.btn{background:linear-gradient(180deg,var(--emer),var(--emerd));color:#04130c;border:none;border-radius:10px;padding:11px 17px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(39,194,133,.25)}
.btn:active{transform:translateY(1px)}
.btn.sec{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.sm{padding:7px 13px;font-size:13px}
label{font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);display:block;margin:12px 0 5px}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:var(--surf2);color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--emer);box-shadow:0 0 0 3px rgba(39,194,133,.16)}
input::placeholder,textarea::placeholder{color:#5d6e8c}
textarea{min-height:120px}
.row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:140px}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;background:rgba(63,164,240,.14);color:#8fcaf6;border:1px solid rgba(63,164,240,.24)}
.rev{background:rgba(224,187,99,.14);color:#e7c878;border-color:rgba(224,187,99,.32)}
.mut{color:var(--mut);font-size:13px}
.qrow{padding:11px;border:1px solid var(--line);border-radius:10px;margin:8px 0;cursor:pointer;display:flex;gap:8px;align-items:center;background:var(--surf2)}
.qrow:hover{border-color:rgba(255,255,255,.22);background:#13213e}
#login{max-width:360px;margin:90px auto;text-align:center}
.hidden{display:none}
.ok{color:#7fe3b6;font-weight:700}
[style*="c0392b"]{color:#ff7a7a!important}
mjx-container{color:var(--ink)}
</style></head><body>
<div id="login" class="card">
 <div style="font-size:34px">🔐</div><h2>Qabul menejer</h2>
 <input id="pin" type="password" placeholder="PIN" style="text-align:center;font-size:20px">
 <button class="btn" style="width:100%;margin-top:12px" onclick="doLogin()">Kirish</button>
 <div class="mut" style="margin-top:8px">Filial: kirgach tanlanadi (Abituriyent / Prezident maktabi)</div>
</div>
<div id="main" class="hidden">
 <div class="bar"><span class="logo">ZIYOKOR</span><b>Qabul menejer</b>
  <select id="branch" style="width:auto;margin-left:auto;color:#333" onchange="loadAll()">
   <option value="abituriyent">Filial: Abituriyent</option>
   <option value="prezident">Filial: Prezident maktabi</option>
  </select>
 </div>
 <div class="tabs">
  <div class="tab on" data-t="res" onclick="tab('res')">📊 Natijalar</div>
  <div class="tab" data-t="qs" onclick="tab('qs')">📝 Savollar</div>
  <div class="tab" data-t="imp" onclick="tab('imp')">➕ Word→AI import</div>
 </div>
 <div class="wrap">
  <div id="res"></div>
  <div id="qs" class="hidden"></div>
  <div id="imp" class="hidden"></div>
 </div>
</div>
<script>
var DB="https://ziyokor-qabul-default-rtdb.firebaseio.com/qabul_test";
var PIN="2024",DATA=null,PREZ=null,OVER={},SESS={};
function doLogin(){ if(document.getElementById('pin').value!==PIN){alert('PIN xato');return;}
 document.getElementById('login').classList.add('hidden');document.getElementById('main').classList.remove('hidden');loadAll();}
function tab(t){['res','qs','imp'].forEach(function(x){document.getElementById(x).classList.toggle('hidden',x!==t);});
 document.querySelectorAll('.tab').forEach(function(e){e.classList.toggle('on',e.dataset.t===t);});}
function typeset(){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise();}
function branch(){return document.getElementById('branch').value;}

function loadAll(){
 Promise.all([
   fetch('./qabul_questions.json?v='+Date.now()).then(function(r){return r.json()}),
   fetch('./prezident_math30.json?v='+Date.now()).then(function(r){return r.json()}).catch(function(){return null}),
   fetch(DB+'/overrides.json').then(function(r){return r.json()}).catch(function(){return{}}),
   fetch(DB+'/sessions.json').then(function(r){return r.json()}).catch(function(){return{}})
 ]).then(function(a){DATA=a[0];PREZ=a[1];OVER=a[2]||{};SESS=a[3]||{};renderRes();renderQs();renderImp();});
}
function applyOver(q){var o=OVER[q.id];if(o){for(var k in o)q[k]=o[k];}return q;}
// Joriy filialning yo'nalishlari (savol banki). Prezident — 30 savol bitta "yo'nalish" sifatida.
function branchYon(){
 if(branch()==='prezident'){
   if(!PREZ||!PREZ.questions)return[];
   return [{id:'prezident_math30',name:(PREZ.test||'Prezident maktabi — Matematika'),count:(PREZ.count||PREZ.questions.length),questions:PREZ.questions}];
 }
 return (DATA&&DATA.yonalishlar)||[];
}
// sessiya joriy filialga tegishlimi
function inBranch(s){var b=(s&&s.info&&s.info.branch)||'abituriyent';return b===branch();}
// id bo'yicha savolni joriy filial bankidan top
function findQ(qid){var ys=branchYon();for(var i=0;i<ys.length;i++){var qs=ys[i].questions||[];for(var j=0;j<qs.length;j++)if(qs[j].id===qid)return qs[j];}return null;}

function renderRes(){
 var el=document.getElementById('res');
 var rows=Object.keys(SESS||{}).map(function(k){return SESS[k];}).filter(Boolean).filter(inBranch);
 rows.sort(function(a,b){return (b.finished||'').localeCompare(a.finished||'');});
 var h='<div class="card"><h3>Topshirganlar ('+rows.length+')</h3>';
 if(!rows.length){h+='<div class="mut">Hali natija yo‘q.</div></div>';el.innerHTML=h;return;}
 h+='<table><tr><th>Ism</th><th>Yo‘nalish</th><th>Sinf</th><th>Javob</th><th>Ball</th><th>Vaqt</th><th></th></tr>';
 rows.forEach(function(s,i){var inf=s.info||{};
  h+='<tr><td><b>'+(inf.name||'-')+'</b></td><td>'+(inf.yon_name||'-')+'</td><td>'+(inf.sinf||'-')+'</td>'
   +'<td>'+(s.answered||0)+'/'+(s.total||0)+'</td><td>'+(s.graded?(s.correct+'/'+s.graded):'—')+'</td>'
   +'<td class="mut">'+((s.finished||'').slice(0,16).replace('T',' '))+'</td>'
   +'<td><button class="btn sec sm" onclick="analyze('+i+')">AI tahlil</button></td></tr>';
 });
 h+='</table></div><div id="anal"></div>';el.innerHTML=h;window._rows=rows;
}
function analyze(i){
 var s=window._rows[i],inf=s.info||{};
 var byFan={};
 Object.keys(s.answers||{}).forEach(function(qid){var raw=findQ(qid);if(!raw)return;var q=applyOver(Object.assign({},raw));if(!q.correct)return;
   var f=q.fan||'?';byFan[f]=byFan[f]||{c:0,t:0};byFan[f].t++;if(s.answers[qid]===q.correct)byFan[f].c++;});
 var h='<div class="card"><h3>AI tahlil — '+(inf.name||'')+'</h3>';
 var fans=Object.keys(byFan);
 if(!fans.length){h+='<div class="mut">Baholangan savollar yetarli emas (javoblar tasdiqlangach to‘liq tahlil bo‘ladi).</div>';}
 else{ fans.forEach(function(f){var d=byFan[f];var p=Math.round(d.c/d.t*100);
   h+='<div style="margin:8px 0"><b>'+f+':</b> '+d.c+'/'+d.t+' ('+p+'%) — '+(p>=70?'<span class=ok>kuchli</span>':p>=40?'o‘rtacha':'<span style="color:#c0392b">zaif, takrorlash kerak</span>')+'</div>';});
   h+='<div class="mut" style="margin-top:8px">Tavsiya: eng past foizli fan bo‘yicha qo‘shimcha tayyorgarlik.</div>';}
 h+='</div>';document.getElementById('anal').innerHTML=h;
}

var curYon=null,curQ=null;
function renderQs(){
 var el=document.getElementById('qs');
 var ys=branchYon();
 if(!ys.length){el.innerHTML='<div class="card mut">Bu filial uchun savol banki topilmadi.</div>';return;}
 var opts=ys.map(function(y){var rev=y.questions.filter(function(q){var qq=applyOver(Object.assign({},q));return qq.needs_review||!qq.correct;}).length;
   return '<option value="'+y.id+'">'+y.name+' — '+y.count+' savol ('+rev+' tekshirilmagan)</option>';}).join('');
 el.innerHTML='<div class="card"><label>Yo‘nalish</label><select id="ysel" onchange="showQList()">'+opts+'</select></div><div id="qlist"></div><div id="qedit"></div>';
 showQList();
}
function showQList(){
 curYon=branchYon().find(function(y){return y.id===document.getElementById('ysel').value;});
 var h='<div class="card"><h3>'+curYon.name+'</h3>';
 curYon.questions.forEach(function(q,i){var qq=applyOver(Object.assign({},q));
  var bad=qq.needs_review||!qq.correct;
  var preview=qq.img?'<img src="'+qq.img+'" style="height:38px;border-radius:6px">':(qq.text||'').slice(0,80)+'…';
  h+='<div class="qrow" onclick="editQ('+i+')"><span class="pill '+(bad?'rev':'')+'">'+(bad?'tekshirish':'OK')+'</span><span class="pill">'+(qq.fan||'')+'</span><span style="flex:1">'+preview+'</span>'+(qq.correct?'<b class=ok>'+qq.correct+'</b>':'')+'</div>';
 });
 h+='</div>';document.getElementById('qlist').innerHTML=h;document.getElementById('qedit').innerHTML='';typeset();
}
function editQ(i){
 var q=applyOver(Object.assign({},curYon.questions[i]));curQ=q;
 var o=q.options||{};
 var h='<div class="card"><h3>Savolni tahrirlash</h3><div class="mut">'+q.id+'</div>'
  +(q.img?'<img src="'+q.img+'" style="max-width:100%;border-radius:10px;margin:8px 0;border:1px solid var(--line)">':'')
  +'<label>Savol matni '+(q.img?'(rasmli savol — matn ixtiyoriy)':'(LaTeX: $...$)')+'</label><textarea id="e_text">'+(q.text||'').replace(/</g,'&lt;')+'</textarea>'
  +'<label>Fan</label><input id="e_fan" value="'+(q.fan||'')+'">'
  +'<div class="row">'+['A','B','C','D'].map(function(L){return '<div><label>Variant '+L+'</label><input id="e_'+L+'" value="'+((o[L]||'')+'').replace(/"/g,'&quot;')+'"></div>';}).join('')+'</div>'
  +'<label>To‘g‘ri javob</label><select id="e_correct"><option value="">— tanlanmagan —</option>'+['A','B','C','D'].map(function(L){return '<option '+(q.correct===L?'selected':'')+'>'+L+'</option>';}).join('')+'</select>'
  +'<div style="margin-top:14px;display:flex;gap:10px"><button class="btn" onclick="saveQ()">💾 Saqlash</button><button class="btn sec" onclick="document.getElementById(\'qedit\').innerHTML=\'\'">Bekor</button></div>'
  +'<div id="savemsg" class="ok" style="margin-top:8px"></div></div>';
 document.getElementById('qedit').innerHTML=h;document.getElementById('qedit').scrollIntoView({behavior:'smooth'});
}
function saveQ(){
 var o={};['A','B','C','D'].forEach(function(L){var v=document.getElementById('e_'+L).value.trim();if(v)o[L]=v;});
 var patch={text:document.getElementById('e_text').value,fan:document.getElementById('e_fan').value,
   options:o,correct:document.getElementById('e_correct').value||null,
   needs_review:!document.getElementById('e_correct').value,edited:new Date().toISOString()};
 fetch(DB+'/overrides/'+curQ.id+'.json',{method:'PUT',body:JSON.stringify(patch)})
  .then(function(){OVER[curQ.id]=patch;document.getElementById('savemsg').textContent='✅ Saqlandi (kioskda darrov ishlaydi)';showQList();})
  .catch(function(){document.getElementById('savemsg').textContent='❌ Saqlanmadi';});
}

function renderImp(){
 var el=document.getElementById('imp');
 if(branch()==='prezident'){el.innerHTML='<div class="card mut">Prezident maktabi savollari rasm asosida (qabul-data orqali yuklanadi). Bu yerda faqat Abituriyent uchun matnli import mavjud.</div>';return;}
 var opts=DATA.yonalishlar.map(function(y){return '<option value="'+y.id+'">'+y.name+'</option>';}).join('');
 el.innerHTML='<div class="card"><h3>Word uslubidagi misolni qo‘shish (AI)</h3>'
  +'<div class="mut">Word/test matnini (savol + A) B) C) D) variantlar) shu yerga qo‘ying. AI uni tahlil qilib, javobini topib, tanlangan yo‘nalishga qo‘shadi.</div>'
  +'<label>Yo‘nalish</label><select id="imp_yon">'+opts+'</select>'
  +'<label>Savol matni</label><textarea id="imp_text" placeholder="1. Hisoblang: 2+2\nA) 3  B) 4  C) 5  D) 6"></textarea>'
  +'<label>Fan (ixtiyoriy)</label><input id="imp_fan" placeholder="masalan Matematika">'
  +'<button class="btn" style="margin-top:12px" onclick="queueImport()">🤖 AI bilan qo‘shish</button>'
  +'<div id="impmsg" class="ok" style="margin-top:10px"></div>'
  +'<div class="mut" style="margin-top:6px">Eslatma: AI ishlovchi (worker) navbatdan olib qayta ishlaydi — bir necha daqiqada savol bankga qo‘shiladi.</div></div>';
}
function queueImport(){
 var rec={yon:document.getElementById('imp_yon').value,fan:document.getElementById('imp_fan').value,
   text:document.getElementById('imp_text').value,status:'queued',created:new Date().toISOString()};
 if(!rec.text.trim()){alert('Matn kiriting');return;}
 fetch(DB+'/import_queue.json',{method:'POST',body:JSON.stringify(rec)})
  .then(function(){document.getElementById('impmsg').textContent='✅ Navbatga qo‘shildi. AI tez orada qayta ishlaydi.';document.getElementById('imp_text').value='';})
  .catch(function(){document.getElementById('impmsg').textContent='❌ Xato';});
}
</script></body></html>
