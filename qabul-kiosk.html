<style>
:root{
  --bg:#070d1c;--surf:rgba(17,28,54,.72);--surf2:#0e1a34;--card:#0f1c38;
  --emer:#27c285;--emerd:#149a64;--gold:#e0bb63;--acc:#3fa4f0;
  --ink:#eef3fc;--mut:#92a3c4;--line:rgba(255,255,255,.10);--line2:rgba(255,255,255,.055)
}
*{box-sizing:border-box;font-family:'Manrope',system-ui,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink)}
body{position:relative;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:-2;background:url('./qabul-assets/hero.jpg') center top/cover no-repeat;opacity:.6}
body::after{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(7,13,28,.15) 0%,rgba(7,13,28,.62) 42%,rgba(7,13,28,.95) 72%,#070d1c 100%)}
.bar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(7,13,28,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:5}
.logo{font-family:'Sora','Manrope',sans-serif;font-weight:800;font-size:21px;letter-spacing:.6px;background:linear-gradient(90deg,var(--emer),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.bar>span[style]{color:var(--mut)!important;font-weight:600!important;letter-spacing:.5px}
.flt{margin-left:auto;background:rgba(39,194,133,.12);color:#7fe3b6;font-weight:700;font-size:12px;padding:6px 13px;border-radius:30px;border:1px solid rgba(39,194,133,.28);white-space:nowrap}
.gear{width:36px;height:36px;opacity:.7;cursor:pointer;color:#bcd;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.03)}
.gear:active{opacity:1}
.wrap{max-width:820px;margin:0 auto;padding:26px 18px 40px}
h1{font-family:'Sora','Manrope',sans-serif;font-size:27px;font-weight:800;letter-spacing:-.02em;margin:6px 0 4px;line-height:1.18}
.sub{color:var(--mut);font-size:14.5px;margin-bottom:20px;font-weight:500}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
.yo{position:relative;background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:17px 18px;font-weight:700;font-size:15.5px;cursor:pointer;transition:.16s ease;overflow:hidden;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.yo::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--emer),var(--gold));opacity:0;transition:.16s}
.yo:hover{border-color:rgba(39,194,133,.45);transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.35)}
.yo:hover::before{opacity:1}
.yo:active{transform:translateY(0)}
.yo.sel{border-color:var(--emer);background:rgba(39,194,133,.12)}
.yo.sel::before{opacity:1}
.yo small{display:block;color:var(--mut);font-weight:600;font-size:12px;margin-top:5px}
.field{margin:14px 0}.field label{font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);display:block;margin-bottom:7px}
.field input,.field select{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:var(--surf2);color:var(--ink);transition:.15s}
.field input::placeholder{color:#5d6e8c}
.field input:focus,.field select:focus{outline:none;border-color:var(--emer);box-shadow:0 0 0 3px rgba(39,194,133,.18)}
.field select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--mut) 50%),linear-gradient(135deg,var(--mut) 50%,transparent 50%);background-position:calc(100% - 20px) 19px,calc(100% - 14px) 19px;background-size:6px 6px,6px 6px;background-repeat:no-repeat}
.btn{background:linear-gradient(180deg,var(--emer),var(--emerd));color:#04130c;border:none;border-radius:13px;padding:15px 22px;font-weight:800;font-size:16px;letter-spacing:.01em;cursor:pointer;width:100%;box-shadow:0 8px 22px rgba(39,194,133,.28);transition:.14s}
.btn:hover{filter:brightness(1.06)}
.btn:active{transform:translateY(1px);box-shadow:0 4px 12px rgba(39,194,133,.22)}
.btn[disabled]{background:#243250;color:#6c7c98;box-shadow:none;cursor:default}
.btn.sec{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.sec:hover{border-color:rgba(255,255,255,.28);filter:none}
.prog{height:9px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin:8px 0 16px}
.prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--emer),var(--gold));width:0;transition:.35s;box-shadow:0 0 12px rgba(39,194,133,.6)}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 16px 40px rgba(0,0,0,.4)}
.qh{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.pill{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 12px;border-radius:20px;background:rgba(63,164,240,.14);color:#8fcaf6;border:1px solid rgba(63,164,240,.25)}
.qtext{font-size:19px;margin:8px 0 18px;line-height:1.55;color:var(--ink)}
.opt{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:10px 0;cursor:pointer;font-size:16.5px;background:var(--surf2);transition:.13s}
.opt:hover{border-color:rgba(255,255,255,.22)}
.opt:active{transform:translateY(1px)}
.opt.sel{border-color:var(--emer);background:rgba(39,194,133,.13);box-shadow:0 0 0 1px var(--emer) inset}
.lett{display:inline-flex;width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.07);align-items:center;justify-content:center;font-weight:800;color:var(--mut);flex:0 0 auto}
.opt.sel .lett{background:var(--emer);color:#04130c}
.txtin{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;font-size:17px;background:var(--surf2);color:var(--ink)}
.txtin:focus{outline:none;border-color:var(--emer);box-shadow:0 0 0 3px rgba(39,194,133,.18)}
.center{text-align:center;padding:46px 18px}
.big{font-size:60px}
.hidden{display:none!important}
.note{font-size:12px;color:#6f80a0;margin-top:10px}
mjx-container{color:var(--ink)}
.timer{margin-left:auto;display:flex;align-items:center;gap:5px;background:rgba(224,187,99,.13);color:var(--gold);font-weight:800;font-size:14.5px;padding:6px 13px;border-radius:30px;border:1px solid rgba(224,187,99,.3);white-space:nowrap;font-variant-numeric:tabular-nums}
.timer svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.timer.warn{background:rgba(239,68,68,.16);color:#ff9b9b;border-color:rgba(239,68,68,.42)}
.qnav{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 16px}
.qn{width:35px;height:35px;border-radius:9px;border:1px solid var(--line);background:var(--surf2);color:var(--mut);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s}
.qn:hover{border-color:rgba(255,255,255,.3)}
.qn.ans{background:rgba(39,194,133,.16);color:#7fe3b6;border-color:rgba(39,194,133,.38)}
.qn.cur{background:var(--emer);color:#04130c;border-color:var(--emer);box-shadow:0 4px 12px rgba(39,194,133,.3)}
/* form maydonlarini ikki ustunga ajratish uchun (albom) */
.fgrid{display:grid;gap:0 18px}
/* savol karta ichi: matn | variantlar */
.qbody{display:block}
/* qotirilgan +998 prefiksli telefon maydoni */
.telwrap{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:12px;background:var(--surf2);overflow:hidden;transition:.15s}
.telwrap:focus-within{border-color:var(--emer);box-shadow:0 0 0 3px rgba(39,194,133,.18)}
.telwrap .telpfx{display:flex;align-items:center;padding:0 13px;font-size:16px;font-weight:800;color:var(--emer);background:rgba(39,194,133,.10);border-right:1px solid var(--line);white-space:nowrap;user-select:none}
.telwrap .telinp{flex:1;width:100%;padding:14px;border:none;background:transparent;color:var(--ink);font-size:16px;outline:none;letter-spacing:1px}
.telwrap .telinp::placeholder{color:#5d6e8c;letter-spacing:normal}
/* === ALBOM (landscape) rejimi — planshet yotiq ushlanganda === */
@media(orientation:landscape) and (min-width:900px){
  .wrap{max-width:1180px;padding-top:18px}
  h1{font-size:30px}
  .grid{grid-template-columns:repeat(3,1fr)}        /* yo'nalishlar 3 ustun */
  .fgrid{grid-template-columns:1fr 1fr}             /* intake maydonlari 2 ustun */
  .qbody{display:grid;grid-template-columns:1.05fr 1fr;gap:6px 30px;align-items:start}
  .qbody .qtext{margin-top:0}
  .qbody img{margin-top:0}
  .qopts{position:sticky;top:84px}                  /* variantlar ko'rinib tursin */
}
/* Ilova uslubidagi maxsus dropdown (Android-native o'rniga) */
.csel{position:relative}
.csel-btn{width:100%;padding:14px;border:1px solid var(--line);border-radius:12px;font-size:16px;background:var(--surf2);color:var(--ink);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:.15s}
.csel-btn::after{content:"▾";color:var(--mut);font-size:13px;flex:0 0 auto}
.csel-btn.ph{color:#5d6e8c}
.csel-btn.dis{opacity:.5;cursor:default}
.csel-btn:not(.dis):hover{border-color:rgba(39,194,133,.45)}
.csel-list{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:40;max-height:46vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 44px rgba(0,0,0,.55);padding:6px;-webkit-overflow-scrolling:touch}
.csel-it{padding:12px 14px;border-radius:9px;font-size:15.5px;cursor:pointer;color:var(--ink)}
.csel-it.on,.csel-it:active{background:rgba(39,194,133,.16);color:#7fe3b6}
</style></head>
<body>
<script>/* OTA bootstrap: webdan yuklangan yangi nusxa bo'lsa — o'shani ishlat (oflayn ham) */(function(){try{var V=parseInt(localStorage.getItem('zq_ota_ver')||'0',10),H=localStorage.getItem('zq_ota_html');if(H&&V>7&&!window.__ZQ_BOOTED){window.__ZQ_BOOTED=1;document.open();document.write(H);document.close();}}catch(e){}})();</script>
<div class="bar">
 <span class="logo">ZIYOKOR</span><span style="font-weight:700">Qabul</span>
 <span class="timer hidden" id="timer"></span>
 <span class="flt" id="fbadge">Filial: …</span>
 <div class="gear" id="gear" title="Menejer (filial almashtirish)">⚙️</div>
</div>
<div class="wrap" id="app"></div>

<script>
var DB="https://ziyokor2024-default-rtdb.firebaseio.com/qabul_test";       // asosiy baza
var DB2="https://ziyokor-qabul-default-rtdb.firebaseio.com/qabul_test";    // zaxira (dual-write — ma'lumot yo'qolmasin)
var EXIT_PIN="2024";
var OTA_BASE='https://ubaskin.github.io/ziyokor-qabul';var APP_VER=7; // build versiyasi — version.json bilan sinxron
var BRANCHES={abituriyent:"Abituriyent",prezident:"Prezident maktabi"};
var app=document.getElementById('app');
var state={branch:localStorage.getItem('zq_branch')||'abituriyent',yon:null,info:{},qs:[],idx:0,ans:{}};
document.getElementById('fbadge').textContent='Filial: '+(BRANCHES[state.branch]||'—')+' 🔒';

// visible manager button — PIN himoyalangan
document.getElementById('gear').addEventListener('click',managerMenu);
function managerMenu(){
 var pin=prompt('Menejer PIN:');if(pin!==EXIT_PIN)return;
 var isApk=!!(window.AndroidKiosk&&AndroidKiosk.exitApp);
 var head='ZIYOKOR Qabul — v'+curVer()+'\n────────────\n';
 var msg=head+'1 - Abituriyent filiali\n2 - Prezident maktabi filiali\n4 - 🔄 Yangilanish ma‘lumoti'+(window._updAvail?' (v'+window._updAvail+' BOR!)':'');
 if(isApk)msg+='\n3 - Ilovadan chiqish (kiosk qulfini yechish)';
 var b=prompt(msg+'\n(bekor: yopish)');
 if(b==='1'){localStorage.setItem('zq_branch','abituriyent');location.reload();}
 if(b==='2'){localStorage.setItem('zq_branch','prezident');location.reload();}
 if(b==='3'&&isApk){AndroidKiosk.exitApp();}
 if(b==='4'){updateInfo();}
}
// ===== OTA: versiyani bilish + tanlab yangilash =====
var SRV={ver:0,date:'',note:''};
function curVer(){return Math.max(APP_VER,parseInt(localStorage.getItem('zq_ota_ver')||'0',10));}
// keshdagi (yuklangan) bankni afzal ko'r, bo'lmasa ichidagi (bundled) fayl
function loadJSON(name){var ov=localStorage.getItem('zq_ota_'+name);if(ov){try{return Promise.resolve(JSON.parse(ov));}catch(e){}}return fetch('./'+name+'?v='+Date.now()).then(function(r){return r.json();});}
function checkUpdate(){ if(!navigator.onLine)return Promise.resolve(false);
 return fetch(OTA_BASE+'/version.json?t='+Date.now()).then(function(r){return r.json();}).then(function(d){
   SRV={ver:parseInt(d.version,10)||0,date:d.date||'',note:d.note||''};
   var avail=SRV.ver>curVer();window._updAvail=avail?SRV.ver:0;
   var g=document.getElementById('gear');if(g){if(avail){g.style.boxShadow='0 0 0 2px #ef4444';g.title='Yangilanish bor (v'+SRV.ver+') — ⚙️ → 4';}else{g.style.boxShadow='';g.title='Menejer (filial almashtirish)';}}
   return avail;
 }).catch(function(){return false;});
}
// Yangilanish ma'lumoti — versiya, manzil va tasdiqlab yuklash
function updateInfo(){
 if(!navigator.onLine){alert('📴 Internet yo‘q.\nO‘rnatilgan versiya: v'+curVer()+'\nServerni tekshirish uchun internet kerak.');return;}
 checkUpdate().then(function(avail){
   var info='ℹ️ Dastur yangilanishi\n────────────\n'
     +'O‘rnatilgan: v'+curVer()+'\n'
     +'Serverda:  '+(SRV.ver?('v'+SRV.ver+(SRV.date?(' ('+SRV.date+')'):'')):'—')+'\n'
     +'Manzil: '+OTA_BASE+'\n'
     +(SRV.note?('\nO‘zgarishlar: '+SRV.note+'\n'):'');
   if(avail){ if(confirm(info+'\n🔴 Yangi versiya bor. Hozir tortib olasizmi?')) doUpdate(); }
   else { alert(info+'\n✅ Eng so‘nggi versiya o‘rnatilgan.'); }
 });
}
function doUpdate(){
 if(!navigator.onLine){alert('Internet yo‘q — yangilash uchun ulanish kerak.');return;}
 var files=['qabul-kiosk.html','qabul_questions.json','prezident_math30.json','olimpus_questions.json','prezident_ibnsino.json'];
 var keys=['zq_ota_html','zq_ota_qabul_questions.json','zq_ota_prezident_math30.json','zq_ota_olimpus_questions.json','zq_ota_prezident_ibnsino.json'];
 var ov=document.createElement('div');ov.id='updov';
 ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(7,13,28,.93);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#eef3fc;font-family:Manrope,sans-serif;padding:24px;text-align:center';
 ov.innerHTML='<div style="font-weight:800;font-size:18px">⏳ Yangilanish yuklanmoqda…</div>'
  +'<div style="width:260px;max-width:80vw;height:12px;background:rgba(255,255,255,.12);border-radius:8px;overflow:hidden"><i id="updbar" style="display:block;height:100%;width:0;background:linear-gradient(90deg,#27c285,#e0bb63);transition:.25s"></i></div>'
  +'<div id="updtxt" style="color:#92a3c4;font-size:14px;font-weight:700">0 / '+files.length+' fayl — 0%</div>';
 document.body.appendChild(ov);
 var done=0;function bar(){var p=Math.round(done/files.length*100);var b=document.getElementById('updbar'),x=document.getElementById('updtxt');if(b)b.style.width=p+'%';if(x)x.textContent=done+' / '+files.length+' fayl — '+p+'%';}
 Promise.all(files.map(function(f,i){return fetch(OTA_BASE+'/'+f+'?t='+Date.now()).then(function(r){if(!r.ok)throw 0;return r.text();}).then(function(txt){localStorage.setItem(keys[i],txt);done++;bar();return txt;});}))
  .then(function(){return fetch(OTA_BASE+'/version.json?t='+Date.now()).then(function(r){return r.json();});})
  .then(function(d){localStorage.setItem('zq_ota_ver',String(parseInt(d.version,10)||0));var x=document.getElementById('updtxt');if(x)x.textContent='✅ Tayyor — ilova qayta ochilmoqda…';setTimeout(function(){location.reload();},800);})
  .catch(function(){var x=document.getElementById('updtxt');if(x){x.textContent='❌ Xato — internetni tekshiring.';x.style.color='#ff9b9b';}setTimeout(function(){var o=document.getElementById('updov');if(o)o.remove();},2600);});
}
function typeset(){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise();}

 +['Instagram','Telegram','Tanishlar','Reklama banneri','Boshqa'].map(function(s){return '<option>'+s+'</option>';}).join('')+'</select></div>';}

// Umumiy vaqt taymeri (savol soni × admin belgilagan daqiqa)
var CLOCK='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
var timerIv=null;
function startTimer(){
 if(!state.qs||!state.qs.length)return;
 var per=state.minPerQ||2;
 state.deadline=Date.now()+Math.round(state.qs.length*per*60000);
 var t=document.getElementById('timer');if(t)t.classList.remove('hidden');
 tickTimer();if(timerIv)clearInterval(timerIv);timerIv=setInterval(tickTimer,1000);
}
function tickTimer(){
 var t=document.getElementById('timer');if(!t||state.deadline==null)return;
 var rem=Math.max(0,state.deadline-Date.now());
 var m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
 t.innerHTML=CLOCK+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
 t.classList.toggle('warn',rem<=60000);
 if(rem<=0){clearInterval(timerIv);timerIv=null;state.deadline=null;alert('Vaqt tugadi — test yakunlanmoqda.');finish();}
}
// xohlagan savolga o'tish
window.gotoQ=function(i){saveTxt();state.idx=i;renderQ();};

// Android-native dropdown o'rniga ilova uslubidagi maxsus dropdown
function styleSelect(sel){
 if(!sel||sel.__styled)return;sel.__styled=1;sel.style.display='none';
 var box=document.createElement('div');box.className='csel';
 var btn=document.createElement('div');btn.className='csel-btn';box.appendChild(btn);
 var list=document.createElement('div');list.className='csel-list hidden';box.appendChild(list);
 function render(){
   var o=sel.options[sel.selectedIndex];btn.textContent=o?o.text:'';
   btn.classList.toggle('ph',!sel.value);btn.classList.toggle('dis',!!sel.disabled);
   list.innerHTML='';
   Array.prototype.forEach.call(sel.options,function(op){
     if(op.disabled&&op.value==='')return;
     var it=document.createElement('div');it.className='csel-it'+(op.value===sel.value?' on':'');it.textContent=op.text;
     it.onclick=function(ev){ev.stopPropagation();sel.value=op.value;list.classList.add('hidden');render();sel.dispatchEvent(new Event('change',{bubbles:true}));};
     list.appendChild(it);
   });
 }
 btn.onclick=function(e){e.stopPropagation();if(sel.disabled)return;var open=!list.classList.contains('hidden');document.querySelectorAll('.csel-list').forEach(function(l){l.classList.add('hidden');});if(!open)list.classList.remove('hidden');};
 sel.parentNode.insertBefore(box,sel.nextSibling);sel.__crender=render;render();
}
function enhanceSelects(){['i_sinf','i_viloyat','i_tuman','i_source'].forEach(function(id){var s=document.getElementById(id);if(s)styleSelect(s);});}
document.addEventListener('click',function(){document.querySelectorAll('.csel-list').forEach(function(l){l.classList.add('hidden');});});
Promise.all([
  loadJSON('qabul_questions.json'),
  fetch(DB+'/overrides.json').then(function(r){return r.json()}).catch(function(){return null}),
  fetch(DB+'/settings.json').then(function(r){return r.json()}).catch(function(){return null}),
  fetch(DB+'/added.json').then(function(r){return r.json()}).catch(function(){return null})
]).then(function(a){
  DATA=a[0];OV=a[1]||{};
  var st=a[2]||{};state.minPerQ=parseFloat(st.min_per_q)>0?parseFloat(st.min_per_q):2;  // har savolga daqiqa (admin sozlaydi, default 2)
  // menejer import qilgan yangi savollarni bankka qo'sh (worker /added ga yozadi)
  var added=a[3]||{};
  DATA.yonalishlar.forEach(function(y){var add=added[y.id];if(!add)return;var have={};y.questions.forEach(function(q){have[q.id]=1;});Object.keys(add).forEach(function(k){var q=add[k];if(q&&q.id&&!have[q.id]){y.questions.push(q);have[q.id]=1;}});});
  // apply menejer overrides (tahrirlangan savol/javob jonli)
  DATA.yonalishlar.forEach(function(y){y.questions.forEach(applyOver);});
  route();
}).catch(function(){app.innerHTML='<div class="center">Maʼlumot yuklanmadi. Internetni tekshiring.</div>'});

window.startPrez=function(){

 state.info={name:nm,sinf:sinf,school:prezSel.school,tel:readTel(),

   branch:'prezident',yon:'prezident_'+prezSel.school,yon_name:'Prezident maktabi ('+prezSel.school+')',started:new Date().toISOString()};
 function startSet(qs){state.qs=qs.slice().map(function(q){return applyOver(Object.assign({},q));});
   state.idx=0;state.ans={};state.yon={id:state.info.yon,name:state.info.yon_name,questions:state.qs};startTimer();renderQ();}
 if(sinf===2||sinf===3){

   state.info.yon='olimpus_'+sinf;state.info.yon_name='Olimpus '+sinf+'-sinf';

};

window.startTest=function(){
 var nm=document.getElementById('i_name').value.trim();
 if(!nm){alert('Ism familiyani kiriting');return;}
 state.info={name:nm,sinf:document.getElementById('i_sinf').value,tel:readTel(),
   viloyat:document.getElementById('i_viloyat').value,tuman:document.getElementById('i_tuman').value,source:document.getElementById('i_source').value,
   yon:state.yon.id,yon_name:state.yon.name,branch:state.branch,started:new Date().toISOString()};
 state.idx=0;startTimer();renderQ();
};
function renderQ(){
 if(state.idx>=state.qs.length){return finish();}
 var q=state.qs[state.idx];var n=state.qs.length;
 var h='<div class="prog"><i style="width:'+Math.round(state.idx/n*100)+'%"></i></div>';
 h+='<div style="display:flex;justify-content:space-between;color:var(--mut);font-weight:800;font-size:13px;margin-bottom:8px"><span>Savol '+(state.idx+1)+' / '+n+'</span><span>'+(q.fan||'')+'</span></div>';
 // savol navigatori — xohlagan savolga o'tish
 h+='<div class="qnav">';
 for(var ni=0;ni<n;ni++){var qq=state.qs[ni];var done=state.ans[qq.id]!=null&&state.ans[qq.id]!=='';
   h+='<div class="qn'+(ni===state.idx?' cur':(done?' ans':''))+'" onclick="gotoQ('+ni+')">'+(ni+1)+'</div>';}
 h+='</div>';
 h+='<div class="qcard"><div class="qh"><span class="pill">'+(q.fan||'')+'</span></div>';
 h+='<div class="qbody"><div class="qstem">';
 if(q.img){h+='<img src="'+q.img+'" style="max-width:100%;border-radius:10px;margin:6px 0">';}
 else{h+='<div class="qtext">'+(q.text||'')+'</div>';}
 h+='</div><div class="qopts">';
 var hasOpts=q.options&&Object.keys(q.options).length>=2;
 if(hasOpts){
   ['A','B','C','D'].forEach(function(L){ if(q.options[L]===undefined)return;
     var sel=state.ans[q.id]===L?' sel':'';
     h+='<div class="opt'+sel+'" onclick="pick(\''+L+'\')"><span class="lett">'+L+'</span><span>'+q.options[L]+'</span></div>';
   });
 } else {
   h+='<input class="txtin" id="txtans" placeholder="Javobingiz..." value="'+(state.ans[q.id]||'')+'">';
 }
 h+='</div></div></div>';
 h+='<div style="display:flex;gap:10px;margin-top:16px">'
  +(state.idx>0?'<button class="btn sec" style="flex:.5" onclick="prevQ()">← Orqaga</button>':'')
  +'<button class="btn" style="flex:1" onclick="nextQ()">'+(state.idx===n-1?'Yakunlash ✓':'Keyingi →')+'</button></div>';
 app.innerHTML=h;typeset();
}
window.pick=function(L){state.ans[state.qs[state.idx].id]=L;renderQ();};
window.prevQ=function(){saveTxt();if(state.idx>0){state.idx--;renderQ();}};
window.nextQ=function(){saveTxt();state.idx++;renderQ();};
function saveTxt(){var t=document.getElementById('txtans');if(t)state.ans[state.qs[state.idx].id]=t.value.trim();}
function finish(){
 if(timerIv){clearInterval(timerIv);timerIv=null;}state.deadline=null;
 var tm=document.getElementById('timer');if(tm)tm.classList.add('hidden');
 var correct=0,graded=0;
 state.qs.forEach(function(q){ var o=q.options||{}; if(q.correct&&o[q.correct]!==undefined){graded++; if(state.ans[q.id]===q.correct)correct++;} });
 var ansd=Object.keys(state.ans).length;
 var rec={info:state.info,answers:state.ans,answered:ansd,total:state.qs.length,
   graded:graded,correct:correct,finished:new Date().toISOString()};
 // OFFLINE-NAVBAT: avval telefon xotirasiga yoz, keyin yuborishga urin (internet yo'q bo'lsa saqlanib turadi)
 queueRec(rec);
 var pend=flushOutbox();  // hozir yuborishga urinadi; qaytaradi: navbatda qolgan soni
 var sent=(pend===0&&navigator.onLine);
 app.innerHTML='<div class="center"><div class="big">🎉</div><h1>Rahmat!</h1>'
  +'<p class="sub">'+state.info.name+', testni yakunladingiz.</p>'
  +'<div style="font-size:18px;font-weight:800;margin:10px 0">Javob berilgan: '+ansd+' / '+state.qs.length+'</div>'
  +(graded?'<div style="color:var(--g);font-weight:800">Avtomat baholangan: '+correct+' / '+graded+' to‘g‘ri</div>':'')
  +'<div class="note" id="sendnote">'+(sent?'✅ Natija qabul menejeriga yuborildi.':'📥 Natija telefon xotirasida saqlandi — internet ulanishi bilan avtomat yuboriladi.')+'</div>'
  +'<button class="btn" style="max-width:320px;margin:20px auto 0" onclick="location.reload()">Yangi test</button></div>';
}
// ===== Offline-navbat (outbox): natija yo'qolmaydi =====
function outbox(){try{return JSON.parse(localStorage.getItem('zq_outbox')||'[]');}catch(e){return [];}}
function setOutbox(a){try{localStorage.setItem('zq_outbox',JSON.stringify(a));}catch(e){}}
function queueRec(rec){var a=outbox();a.push({id:'r'+Date.now()+'_'+Math.floor(Math.random()*1e6),rec:rec});setOutbox(a);}
// Navbatni ketma-ket yuboradi; qaytaradi: hali navbatda qolgan yozuvlar soni
function flushOutbox(){
 var a=outbox();
 if(!a.length||!navigator.onLine||window._flushing)return a.length;
 window._flushing=true;
 var item=a[0];var body=JSON.stringify(item.rec);
 fetch(DB+'/sessions.json',{method:'POST',body:body}).then(function(r){
   if(!r.ok)throw 0;
   fetch(DB2+'/sessions.json',{method:'POST',body:body}).catch(function(){}); // zaxira baza — muvaffaqiyat shart emas
   var cur=outbox();cur.shift();setOutbox(cur);
   window._flushing=false;
   var note=document.getElementById('sendnote');if(note&&!cur.length)note.innerHTML='✅ Natija qabul menejeriga yuborildi.';
   if(cur.length)flushOutbox(); // keyingisini yubor
 }).catch(function(){window._flushing=false;}); // tarmoq yo'q — keyinroq qayta urinadi
 return a.length;
}
window.addEventListener('online',flushOutbox);
setInterval(function(){if(outbox().length)flushOutbox();},30000); // har 30s qolgan navbatni tekshir
flushOutbox(); // ilova ochilganda qolgan yozuvlarni yubor
