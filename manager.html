<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIYOKOR — Menejer paneli</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f1226;--card:#1a1f3a;--card2:#232a4d;--text:#fff;--hint:#9aa3c7;
  --btn:#5b7cfa;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;padding:18px;}
.head{display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto 18px;flex-wrap:wrap;gap:10px;}
.head h1{font-size:22px;font-weight:800;display:flex;align-items:center;gap:10px;}
.head .logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;align-items:center;justify-content:center;font-size:22px;}
.stats{display:flex;gap:10px;flex-wrap:wrap;}
.stat{background:var(--card);border-radius:12px;padding:8px 14px;font-size:13px;color:var(--hint);}
.stat b{color:var(--text);font-size:18px;display:block;}
.filters{max-width:1100px;margin:0 auto 14px;display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:8px 14px;border-radius:20px;background:var(--card);border:1px solid var(--card2);
  color:var(--hint);font-size:13px;cursor:pointer;}
.chip.active{background:var(--btn);color:#fff;border-color:var(--btn);}
.grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;}
.lead{background:var(--card);border-radius:16px;padding:16px;border-left:4px solid var(--card2);}
.lead.l1{border-left-color:#ef4444;} .lead.l2{border-left-color:#f59e0b;}
.lead.l3{border-left-color:#3b82f6;} .lead.l4{border-left-color:#10b981;} .lead.l5{border-left-color:#a855f7;}
.lead-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.lead-name{font-size:18px;font-weight:700;}
.lead-meta{font-size:13px;color:var(--hint);margin-top:2px;}
.level-badge{padding:4px 10px;border-radius:10px;font-size:12px;font-weight:700;white-space:nowrap;}
.lv1{background:#3d161a;color:#f87171;} .lv2{background:#3d2a0f;color:#fb923c;}
.lv3{background:#16243d;color:#60a5fa;} .lv4{background:#0f3d2e;color:#34d399;} .lv5{background:#2a163d;color:#c084fc;}
.row{font-size:14px;margin:6px 0;display:flex;gap:6px;}
.row .k{color:var(--hint);min-width:74px;}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:12px;margin:2px 3px 0 0;}
.tag.weak{background:#3d161a;color:#f87171;} .tag.strong{background:#0f3d2e;color:#34d399;}
.hook{background:var(--card2);border-radius:10px;padding:10px;font-size:13px;margin-top:10px;line-height:1.5;}
.hook b{color:#fbbf24;}
.actions{display:flex;gap:8px;margin-top:12px;}
.actions select{flex:1;background:var(--card2);color:var(--text);border:1px solid #2e375f;border-radius:10px;padding:8px;font-size:13px;}
.actions a{background:var(--success);color:#fff;text-decoration:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;}
.empty{max-width:1100px;margin:60px auto;text-align:center;color:var(--hint);}
.bars{margin-top:8px;}
.bar{display:flex;align-items:center;gap:6px;font-size:12px;margin:3px 0;}
.bar .bn{min-width:120px;color:var(--hint);}
.bar .bt{flex:1;height:8px;background:var(--card2);border-radius:4px;overflow:hidden;}
.bar .bf{height:100%;border-radius:4px;}
</style>
</head>
<body>
<div id="pin-gate" style="position:fixed;inset:0;z-index:999;background:#0f1226;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
  <div style="font-size:42px">🔒</div>
  <div style="font-size:18px;font-weight:700">Menejer paneli</div>
  <div style="color:#9aa3c7;font-size:14px">PIN-kodni kiriting</div>
  <input id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="••••"
    style="width:160px;text-align:center;font-size:24px;letter-spacing:6px;padding:12px;border-radius:12px;border:2px solid #232a4d;background:#1a1f3a;color:#fff;outline:none;">
  <button onclick="checkPin()" style="padding:12px 28px;border:none;border-radius:12px;background:#5b7cfa;color:#fff;font-size:16px;font-weight:600;cursor:pointer">Kirish</button>
  <div id="pin-err" style="color:#ef4444;font-size:13px;min-height:16px"></div>
</div>

<div class="head">
  <h1><span class="logo">📊</span> ZIYOKOR — Qabul natijalari</h1>
  <div class="stats" id="stats"></div>
</div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">Hozircha natija yo'q. Planshetda test topshirilsa, shu yerda paydo bo'ladi.</div>

<script>
// ── PIN-qulf (yengil himoya; ASL himoya = Firebase qoidalari) ──
const MANAGER_PIN = "2024";   // ⚙️ menejer PIN-kodini shu yerda o'zgartiring
function checkPin(){
  const v=document.getElementById('pin-input').value;
  if(v===MANAGER_PIN){ try{sessionStorage.setItem('qabul_mgr','1');}catch(e){} document.getElementById('pin-gate').style.display='none'; }
  else { document.getElementById('pin-err').textContent='Noto\'g\'ri PIN'; document.getElementById('pin-input').value=''; }
}
document.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('qabul_mgr')==='1') document.getElementById('pin-gate').style.display='none';
  const inp=document.getElementById('pin-input');
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') checkPin(); });
  inp.focus();
});

firebase.initializeApp({ databaseURL:"https://ziyokor2024-default-rtdb.firebaseio.com" });
const db = firebase.database();
const leadsRef = db.ref("qabul_test/leads");
const groupsRef = db.ref("qabul_test/groups");

const LEVEL_LABEL={1:"Orqada",2:"Darajada (kuchsiz)",3:"Mustahkam",4:"Oldinda",5:"Yuqori/olimpiada"};
let allLeads=[], filter="all", groupsByName={};

// guruhlar — bo'sh joy ("joy qoldi") hisoblash uchun
groupsRef.on('value',snap=>{
  groupsByName={};
  const v=snap.val()||{};
  for(const g of Object.values(v)){ if(g && g.nomi) groupsByName[g.nomi]=g; }
  render();
});
function joyQoldi(nomi){
  const g=groupsByName[nomi]; if(!g || g.sigim==null) return null;
  return Math.max(0, Number(g.sigim)-Number(g.band||0));
}
function urgencyTag(nomi){
  if(!nomi) return '';
  const j=joyQoldi(nomi);
  if(j==null) return '';
  if(j<=0) return ` <span class="tag" style="background:#3d161a;color:#f87171">to'lgan</span>`;
  if(j<=3) return ` <span class="tag" style="background:#3d2a0f;color:#fb923c">${j} joy qoldi</span>`;
  return ` <span class="tag" style="background:#0f3d2e;color:#34d399">${j} joy bor</span>`;
}

const FILTERS=[["all","Hammasi"],["yangi","Yangi"],["bog'lanildi","Bog'lanildi"],["yozildi","Yozildi"]];
function buildFilters(){
  const f=document.getElementById('filters'); f.innerHTML='';
  for(const [k,lbl] of FILTERS){
    const c=document.createElement('div'); c.className='chip'+(filter===k?' active':'');
    c.textContent=lbl; c.onclick=()=>{filter=k;buildFilters();render();}; f.appendChild(c);
  }
}

leadsRef.on('value',snap=>{
  const val=snap.val()||{};
  allLeads=Object.entries(val).map(([id,v])=>({id,...v}))
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  render();
});

function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmtDate(iso){ try{const d=new Date(iso);return d.toLocaleString('uz-UZ',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return '';} }
function phoneDigits(p){return (p||'').replace(/\D/g,'');}

function hookText(lead){
  const zaif=(lead.zaif||[]);
  if(!zaif.length) return `Daraja <b>${lead.daraja}</b> — ${esc(LEVEL_LABEL[lead.daraja]||'')}. Mos guruhga taklif qiling.`;
  return `Zaif: <b>${zaif.map(esc).join(', ')}</b>. Ota-onaga shu mavzulardagi bo'shliqni ko'rsating — aynan buni guruhimiz to'ldiradi (sotuv ilgagi).`;
}

function render(){
  const grid=document.getElementById('grid');
  let leads=allLeads;
  if(filter!=='all') leads=leads.filter(l=>(l.holat||'yangi')===filter);
  document.getElementById('empty').style.display=allLeads.length?'none':'block';

  // stats
  const byLevel=[1,2,3,4,5].map(L=>allLeads.filter(l=>l.daraja===L).length);
  const yangi=allLeads.filter(l=>(l.holat||'yangi')==='yangi').length;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><b>${allLeads.length}</b>Jami</div>`+
    `<div class="stat"><b>${yangi}</b>Yangi</div>`+
    byLevel.map((n,i)=>`<div class="stat"><b>${n}</b>Daraja ${i+1}</div>`).join('');

  grid.innerHTML=leads.map(l=>{
    const L=l.daraja||0;
    const groups=(l.mavzular||[]).slice(0,5).map(g=>{
      const pct=Math.round((g.ratio||0)*100);
      const col=pct<50?'#ef4444':pct<75?'#f59e0b':'#10b981';
      return `<div class="bar"><span class="bn">${esc(g.name)}</span><span class="bt"><span class="bf" style="width:${pct}%;background:${col}"></span></span><span>${pct}%</span></div>`;
    }).join('');
    return `<div class="lead l${L}">
      <div class="lead-top">
        <div><div class="lead-name">${esc(l.ism)}</div>
          <div class="lead-meta">${esc(l.sinf)}-sinf · ${esc(l.tel)} · ${fmtDate(l.sana)}</div></div>
        <div class="level-badge lv${L}">Daraja ${L}</div>
      </div>
      <div class="row"><span class="k">Baho:</span><span>${esc(LEVEL_LABEL[L]||'')} · ${l.foiz||0}%${l.persentil?` · <b>${l.persentil}-persentil</b>`:''} · ${l.togri||0}/${l.jamiSavol||0}</span></div>
      <div class="row"><span class="k">Zaif:</span><span>${(l.zaif||[]).map(z=>`<span class="tag weak">${esc(z)}</span>`).join('')||'—'}</span></div>
      <div class="row"><span class="k">Kuchli:</span><span>${(l.kuchli||[]).map(z=>`<span class="tag strong">${esc(z)}</span>`).join('')||'—'}</span></div>
      <div class="row"><span class="k">Tavsiya:</span><span>${esc(l.tavsiyaGuruh)||'<span style="color:#f59e0b">guruh tanlanmagan</span>'}${urgencyTag(l.tavsiyaGuruh)}</span></div>
      ${(l.bayroqlar&&l.bayroqlar.length)?`<div class="row"><span class="k">⚠️</span><span style="color:#fbbf24">${l.bayroqlar.map(esc).join('; ')}</span></div>`:''}
      <div class="bars">${groups}</div>
      <div class="hook">💡 ${hookText(l)}</div>
      <div class="actions">
        <select onchange="setHolat('${l.id}',this.value)">
          ${['yangi',"bog'lanildi",'yozildi','rad etdi'].map(s=>`<option value="${s}" ${((l.holat||'yangi')===s)?'selected':''}>${s}</option>`).join('')}
        </select>
        <a href="tel:${phoneDigits(l.tel)}">📞 Qo'ng'iroq</a>
        <a href="ozet.html?id=${encodeURIComponent(l.id)}" target="_blank" style="background:#5b7cfa">📄 Xulosa</a>
      </div>
    </div>`;
  }).join('');
}

function setHolat(id,val){ leadsRef.child(id).update({holat:val}); }

buildFilters();
</script>
</body>
</html>
