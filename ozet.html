<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIYOKOR — Natija xulosasi</title>
<!--
  Ota-onaga ko'rsatiladigan XULOSA. Menejer manager.html dan "📄 Xulosa" orqali ochadi
  (yoki QR bilan ota-ona telefoniga). Bitta lead'ni id bo'yicha o'qiydi: ?id=<pushKey>.
  Eslatma: id'ni bilgan kishi shu xulosani ko'radi — havola menejer nazoratida.
-->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f1226;--card:#1a1f3a;--card2:#232a4d;--text:#fff;--hint:#9aa3c7;
  --accent:linear-gradient(135deg,#667eea,#764ba2);--success:#10b981;--warning:#f59e0b;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 40px;}
.wrap{max-width:520px;margin:0 auto;}
.hero{background:var(--accent);padding:30px 24px 26px;text-align:center;border-radius:0 0 28px 28px;}
.hero .logo{font-size:40px;margin-bottom:6px;}
.hero h1{font-size:22px;font-weight:800;}
.hero p{color:rgba(255,255,255,.85);font-size:14px;margin-top:4px;}
.body{padding:22px 18px;}
.ring{width:120px;height:120px;border-radius:50%;background:var(--card);border:6px solid;margin:0 auto 8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring .lvl{font-size:38px;font-weight:800;line-height:1;}
.ring .of{font-size:13px;color:var(--hint);}
.lvl-label{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px;}
.pct{text-align:center;color:var(--hint);font-size:15px;margin-bottom:22px;}
.section{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;}
.section h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.tag{display:inline-block;padding:5px 12px;border-radius:10px;font-size:14px;margin:3px 4px 0 0;}
.tag.weak{background:#3d2a0f;color:#fbbf24;} .tag.strong{background:#0f3d2e;color:#34d399;}
.grp{background:var(--accent);border-radius:16px;padding:18px;text-align:center;margin-bottom:14px;}
.grp .gn{font-size:18px;font-weight:800;} .grp .gm{color:rgba(255,255,255,.85);font-size:14px;margin-top:4px;}
.plan{font-size:14px;line-height:1.7;white-space:pre-wrap;color:#dfe3f5;}
.note{text-align:center;color:var(--hint);font-size:13px;margin-top:10px;line-height:1.6;}
.loading,.err{text-align:center;padding:60px 20px;color:var(--hint);}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading" id="loading">Yuklanmoqda…</div>
</div>

<script>
var DB="https://ziyokor2024-default-rtdb.firebaseio.com/qabul_test";
const LEVEL_LABEL={0:"Baholanmagan",1:"Asos qo'yilmoqda",2:"Rivojlanish bosqichida",3:"Mustahkam",4:"Sinfdan oldinda",5:"Yuqori / olimpiada saviyasi"};
const LEVEL_COLOR={0:"#64748b",1:"#ef4444",2:"#f59e0b",3:"#3b82f6",4:"#10b981",5:"#a855f7"};
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function levelOf(pct,graded){ if(!graded)return 0; if(pct>=85)return 5; if(pct>=70)return 4; if(pct>=50)return 3; if(pct>=30)return 2; return 1; }

const id=new URLSearchParams(location.search).get('id');
if(!id){ document.getElementById('wrap').innerHTML='<div class="err">Xulosa havolasi noto\'g\'ri.</div>'; }
else Promise.all([
  fetch(DB+'/sessions/'+id+'.json').then(r=>r.json()),
  fetch('./qabul_questions.json?v='+Date.now()).then(r=>r.json()).catch(()=>null),
  fetch('./prezident_math30.json?v='+Date.now()).then(r=>r.json()).catch(()=>null),
  fetch(DB+'/overrides.json').then(r=>r.json()).catch(()=>({})),
  fetch('./olimpus_questions.json?v='+Date.now()).then(r=>r.json()).catch(()=>null)
]).then(([s,DATA,PREZ,OVER,OLIMP])=>{
  OVER=OVER||{};
  if(!s){ document.getElementById('wrap').innerHTML='<div class="err">Natija topilmadi.</div>'; return; }
  // savol kartasi (id -> {fan,correct}), override qo'llab
  const qmap={};
  function add(q){const o=OVER[q.id]||{};qmap[q.id]={fan:o.fan||q.fan,correct:('correct'in o)?o.correct:q.correct,mavzu:o.mavzu||q.mavzu};}
  if(DATA&&DATA.yonalishlar)DATA.yonalishlar.forEach(y=>(y.questions||[]).forEach(add));
  if(PREZ&&PREZ.questions)PREZ.questions.forEach(add);
  if(OLIMP&&OLIMP.sinflar)Object.keys(OLIMP.sinflar).forEach(k=>(OLIMP.sinflar[k].questions||[]).forEach(add));
  // fan bo'yicha tahlil
  const byFan={};Object.keys(s.answers||{}).forEach(qid=>{const q=qmap[qid];if(!q||!q.correct)return;const f=q.fan||'?';byFan[f]=byFan[f]||{c:0,t:0};byFan[f].t++;if(s.answers[qid]===q.correct)byFan[f].c++;});
  const fans=Object.keys(byFan);
  const graded=fans.reduce((a,f)=>a+byFan[f].t,0), correct=fans.reduce((a,f)=>a+byFan[f].c,0);
  const pct=graded?Math.round(correct/graded*100):0; const L=levelOf(pct,graded);
  const strong=fans.filter(f=>byFan[f].c/byFan[f].t>=0.7), weak=fans.filter(f=>byFan[f].c/byFan[f].t<0.5);
  // mavzu (topic) bo'yicha — fan'dan chuqurroq
  const byTop={};Object.keys(s.answers||{}).forEach(qid=>{const q=qmap[qid];if(!q||!q.correct)return;const m=q.mavzu||q.fan||'?';byTop[m]=byTop[m]||{c:0,t:0};byTop[m].t++;if(s.answers[qid]===q.correct)byTop[m].c++;});
  const tops=Object.keys(byTop);
  const topWeak=tops.filter(m=>byTop[m].c/byTop[m].t<0.5).sort((a,b)=>byTop[a].c/byTop[a].t-byTop[b].c/byTop[b].t);
  const topStrong=tops.filter(m=>byTop[m].c/byTop[m].t>=0.7);
  // AI tahlil (worker yozadi; bo'lmasa mavzu-hisobi ishlatiladi)
  const ai=(s.ai_analysis&&!s.ai_analysis.skipped)?s.ai_analysis:null;
  const wTopics=(ai&&ai.weak_topics&&ai.weak_topics.length)?ai.weak_topics:topWeak;
  const sTopics=(ai&&ai.strong_topics&&ai.strong_topics.length)?ai.strong_topics:topStrong;
  const inf=s.info||{};
  document.getElementById('wrap').innerHTML=`
    <div class="hero"><div class="logo">🎓</div><h1>ZIYOKOR</h1><p>Qabul testi — natija xulosasi</p></div>
    <div class="body">
      <div style="text-align:center;font-size:18px;font-weight:700;margin-bottom:4px">${esc(inf.name||'')}</div>
      <div style="text-align:center;color:var(--hint);font-size:14px;margin-bottom:14px">${esc(inf.yon_name||'')} · ${esc(inf.sinf||'')}-sinf</div>
      <div class="ring" style="border-color:${LEVEL_COLOR[L]}"><div class="lvl" style="color:${LEVEL_COLOR[L]}">${graded?L:'—'}</div><div class="of">5 dan</div></div>
      <div class="lvl-label">${esc(LEVEL_LABEL[L]||'')}</div>
      <div class="pct">${graded?`To'g'ri javoblar: <b>${correct}/${graded}</b> (${pct}%)`:`Javob berildi: ${s.answered||0}/${s.total||0}`}</div>
      ${ai&&ai.summary?`<div class="section"><h3>🧠 AI tahlil</h3><div class="plan">${esc(ai.summary)}</div></div>`:''}
      ${sTopics.length?`<div class="section"><h3>💪 Kuchli mavzular</h3>${sTopics.map(m=>`<span class="tag strong">${esc(m)}${byTop[m]?` — ${Math.round(byTop[m].c/byTop[m].t*100)}%`:''}</span>`).join('')}</div>`:''}
      ${wTopics.length?`<div class="section"><h3>📈 O'sish nuqtalari (zaif mavzular)</h3><div style="color:var(--hint);font-size:13px;margin-bottom:8px">Shu mavzularga e'tibor bersak, natija tez ko'tariladi:</div>${wTopics.map(m=>`<span class="tag weak">${esc(m)}${byTop[m]?` — ${Math.round(byTop[m].c/byTop[m].t*100)}%`:''}</span>`).join('')}</div>`:''}
      ${ai&&ai.recommendation?`<div class="section"><h3>🎯 Tavsiya</h3><div class="plan">${esc(ai.recommendation)}</div></div>`:''}
      <div class="grp"><div class="gn">ZIYOKOR o'quv markazi</div><div class="gm">Menejer siz bilan jadval va mos guruhni hal qiladi</div></div>
      <div class="note">Bu xulosa ZIYOKOR menejeri bilan suhbat uchun.<br>Savollaringiz bo'lsa — menejerga murojaat qiling.</div>
    </div>`;
}).catch(e=>{ document.getElementById('wrap').innerHTML='<div class="err">Xato: '+esc(e.message)+'</div>'; });
</script>
</body>
</html>
